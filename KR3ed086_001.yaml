body:
  text: 卷一痙濕暍病方栝蔞桂枝湯治太陽病其症備身體強𠘧𠘧然脈反沉遲此為痙病此湯主之栝蔞根桂枝生薑切芍藥各三兩甘草二兩炙大棗十二枚擘上六味㕮咀以水九升微火煮取三升溫分三服微汗汗不出食頃啜熱粥發歌曰太陽症備脈反沉遲身體𠘧𠘧欲痙時三兩蔞根薑桂芍二甘十二棗枚宜元犀按痙是血虛筋燥為病言濕者是推其未成痙之前濕氣挾風而鬱成內熱也本條云太陽症備脈反沉遲者此沉遲乃血虛所致非臟寒症也故以桂枝湯和營衛以祛風加栝蔞根則清氣分之熱而大潤太陽既耗之液則經氣流通風邪自解濕氣自行筋不燥而痙愈矣又按方中薑桂合甘棗為辛甘化陽芍藥合甘棗為苦甘化陰陰陽和則得微汗而邪解矣啜粥則又資陽明之穀氣以勝邪更深一層立法但項背𠘧𠘧脈浮數者為風淫於外而內之津液未傷故加葛根以宣外脈沉遲者為風淫於外而內之津液已傷故加栝蔞根以滋內以栝蔞根苦寒潤燥之功大也內經云肺移熱於腎傳為柔痙龐安常謂此方栝蔞根不主項強𠘧𠘧其意以肺熱不令移於腎也此解亦超葛根湯歌見長沙方歌括治太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙此湯主之葛根麻黃甘草芍藥桂枝生薑大棗元犀按無汗例用麻黃湯然惡其太峻故於桂枝湯加麻黃以發汗君葛根以清經絡之熱是發表中寓養陰之意也又此方與前方皆是太陽中兼陽明之藥以陽明主宗筋也大承氣湯歌見長沙方歌括治痙病胸滿口噤臥不著席腳攣急必齘齒可與此湯大黃厚朴枳實芒硝元犀按胸滿口噤腳攣急齘齒等證皆熱甚灼筋筋急而甚之象以此湯急下而救陰齘牙藥不能進以此湯從鼻中灌之麻黃加朮湯治濕家身煩疼發其汗為宜慎不可以火攻之宜此湯主之麻黃三兩去節桂枝二兩甘草一兩炙白朮四兩杏仁七十個去皮尖上五味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微汗歌曰煩疼濕氣裹寒中發汗為宜忌火攻莫訝麻黃湯走表術加四兩里相融元犀按身煩疼者寒濕之邪著於膚表也膚表實故無汗無汗則邪無從出矣方用麻黃湯髮膚表之汗以散表寒又恐大汗傷陰寒去而濕反不去加白朮補土生液而助除濕氣此發汗中寓緩汗之法也又白朮補脾驅濕之功甚大且能助脾之轉輸而利水觀仲祖用術各方可知今人炒燥炒黑上蒸水漂等制皆失經旨麻黃杏仁薏苡甘草湯治病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也麻黃半兩杏仁十個去皮尖薏苡半兩甘草一兩炙上銼麻豆大每服四錢匕水一盞半煎八分去滓溫服有微汗避風歌曰風濕身疼日晡時濕無去來風有休息與上節濕家分別在此當風汗出當風取冷久傷取冷病之基薏麻半兩十枚杏炙草扶中豫其勝濕之權一兩宜參以上二方為濕家立法也又有風濕之證其痛輕掣不可屈伸非如濕家之痛重著不能轉側且濕家發熱旦暮不殊風濕發熱日晡增甚晡申時也陽明旺於申酉戌土惡濕今為風濕所幹當其旺時邪正相搏則反劇也濕無去來風有休作故名風濕然言風寒亦在其中觀原文云汗出當風或久傷取冷意可知矣蓋痙病非風不成濕痹無寒不作方中麻黃散寒意苡除濕杏仁利氣助麻黃驅寒之力甘草補中豫薏苡勝濕之權制方之精密如此防己黃耆湯治風濕脈浮身重汗出惡風者主之防己一兩甘草半兩炙白朮七錢半黃耆一兩一分一本用一兩上銼麻豆大每服五錢匕生薑四片大棗一枚水盞半煎八分去滓溫服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令微汗瘥歌曰身重脈浮汗上節無汗故用麻黃髮之此節汗出只用防己驅之惡風七錢半術五錢甘草通己耆一兩磨分服每服五錢匕四片生薑一棗充加減歌曰喘者再入五錢麻胃不和兮芍藥加三分分字去聲讀七錢五分今不瘥寒取細辛氣衝桂俱照三分效可誇服後如蟲行皮里腰下如冰取被遮遮繞腰溫得微汗伊岐祕法闡長沙合參上方治實邪無汗即桂枝麻黃二湯例也虛汗自出故不用麻黃以散之只用防己以驅之服後如蟲行及腰下如冰云云皆濕氣下行之徵也然非耆朮甘草焉能使衛陽復振而驅濕下行哉元犀按張隱菴本草經注云防己生於漢中者破之紋如車輻莖藤空通主通氣行水以防己土之藥故有防己之名金匱治水治痰諸方蓋取氣運於上而水能就下也李東垣謂防己乃下焦血分之藥上焦氣分者禁用等論張隱菴歷歷指駁使東垣聞之當亦俯首無詞噫不讀神農本經而妄為臆說甘為伊岐之罪人復何責焉防己功用余先君注有神農本草經議論甚詳毋庸再贅桂枝附子湯桂枝附子生薑甘草大棗白朮附子湯附子白朮生薑甘草大棗甘草附子湯甘草附子桂枝白朮以上三方歌解證治俱見長沙方歌括白虎人參湯歌見長沙方歌括太陽中熱者暍是也汗出惡寒身熱而渴者主之知母石膏甘草粳米人參元犀按白虎西方神名也其令為秋其政清肅涼風至白露降則溽暑潛消以此湯有徹暑熱之功行清肅之政故以白虎名之一物瓜蒂湯治太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也此湯主之瓜蒂二七個上銼以水一升煮取五合去滓溫服歌曰暍病陰陽認要真熱疼身重得其因暑為濕戀名陰暑二七甜瓜蒂可珍元犀按此物能去水氣水去則暑無所依而自愈矣尤在涇云暑雖陽邪而氣恆與濕相合陽求陰之義也暑因濕入而暑反居濕之中陰包陽之象也又云暑之中人也陰虛而多火者暑即寓於火之中為汗出而煩渴陽虛而多濕者暑即伏於濕之內為身熱而疼重故暑病恆以濕為病而治濕即所以治暑瓜蒂苦寒能吐能下去身面四肢水氣水去而暑解此治中暑兼濕者之法也百合狐惑陰陽毒方總歌百合尤云百脈朝於肺以肺為主病從百脈成起居冒昧各難名藥投吐利如神附頭痛參觀溺更明以溺時頭痛為辨蓋百脈之所重在少陰太陽以太陽統六經之氣其經上循巔頂下通水道氣化不行乃下溺而上頭痛少陰為生水之源開閉澀乃溺而淅然百合知母湯百合病發汗後者此方主之百合十枚知母三兩上先以水洗百合漬一宿當白沫出去其水別以泉水二升煎取一升去滓別以泉水二升煎知母取一升後合煎取一升五合分溫再服歌曰病非應汗汗傷陰知母當遵三兩針漬去沫涎七枚百合別煎泉水是金針諸方煎法俱同元犀按百脈俱朝於肺百脈俱病病形錯雜不能悉治只於肺治之肺主氣氣之為病非實而不順即虛而不足百合能治邪氣之實而補正氣之虛知母入肺金益其水源下通膀胱使天水之氣合而所傷之陰轉則其邪從小便出矣若誤汗傷陰者汗為陰液陰液傷故以此湯維其陽維陽即所以救陰也王晉三云本文云百脈一宗明言病歸於肺君以百合甘涼清肺即此可療此疾再佐以各經清解絡熱之藥治其病所從來當用先後煮法使不悖於手足經各行之理若誤汗傷太陽者溺時頭痛以知母救肺之陰使膀胱水府知有母氣救肺即所以救膀胱是陽病救陰之法也百合滑石代赭石湯百合病下之後者此湯主之百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹上先煎百合如前法別以泉水二升煎滑石代赭石取一升去滓後合和重煎取一升五合分溫服五合歌曰不應議下下之瘥既下還當竭舊邪百合七枚赭彈大滑須三兩效堪誇元犀按誤下者其熱必陷熱陷必傷下焦之陰故以百合清補肺金引動水源以代赭石鎮離火而不使其上騰以滑石導熱氣而能通水府則所陷之邪從小便而出自無灼陰之患矣此即見陽救陰法也王晉三云誤下傷少陰者溺時淅然以滑石上通肺下通太陽之陽恐滑石通府利竅仍蹈出汗之弊乃復代赭石重鎮心經之氣使無汗泄之虞是陰病救陽之法也百合雞子黃湯百合病吐之後者此方主之百合七枚雞子黃一枚上先煎百合如前法取一升去滓內雞子黃攪勻煎五分溫服歌曰不應議吐吐傷中中者陰之守也必仗陰精上奉功內經云陰精上奉其人壽百合七枚洗去沫雞黃後入攪渾融元犀按吐後傷中者病在陰也陰傷故用雞子黃養心胃之陰百合滋肺氣下潤其燥胃為肺母胃安則肺氣和而令行此亦用陰和陽無犯攻陽之戒王晉三云誤吐傷陽明者以雞子黃救厥陰之陰以安胃氣救厥陰即所以奠陽明救肺之母氣是亦陽病救陰之法也百合地黃湯百合病不經吐下發汗病形如初者此湯主之百合七枚生地黃汁一升上先煎百合如前法取一升去滓內地黃汁煎取一升五合溫分再服中病勿更服大便當如漆歌曰不經汗下吐諸傷形但如初守太陽遷延日久始終在太陽經不變者地汁一升百合七陰柔最是化陽剛元犀按病久不經吐下發汗病形如初者是郁久生熱耗傷氣血矣主以百合地黃湯者以百合苦寒清氣分之熱地黃汁甘潤泄血分之熱皆取陰柔之品以化陽剛為泄熱救陰法也中病者熱邪下泄由大便而出矣故曰如漆色百合洗方百合病一月不解變成渴者此方主之百合一升以水一斗漬之一宿以洗身已食煮餅勿以咸豉也歌曰月周不解渴因成邪熱流連肺不清百合一升水一斗洗身食餅不和羹勿以咸豉合參皮毛為肺之合洗其外亦所以通其內也又食煮餅者假麥氣穀氣以輸津勿以咸豉者恐鹹味耗水以增渴也栝蔞牡蠣散百合病渴不瘥者此散主之栝蔞根牡蠣熬等分上為細末飲服方寸匕日三服歌曰洗而仍渴屬浮陽牡蠣蔞根並等量研末飲調方寸匕寒兼鹹苦苦寒鹹寒效逾常元犀按洗後而渴不瘥是內之陰氣未復陰氣未復由於陽氣之亢故用牡蠣以潛其陽栝蔞根以生其津津生陽降而渴愈矣百合滑石散百合病變發熱者此散主之百合一兩炙滑石三兩上為散飲服方寸匕日三服當微利者止服熱則除歌曰前此寒無熱亦無首章言如寒無寒如熱無熱變成發熱熱堪虞清疏滑石宜三兩百合烘篩一兩需元犀按百合病原無偏熱之證變發熱者內熱充滿淫於肌膚非如熱之比主以百合滑石散者百合清金瀉火降逆氣從高源以導之滑石退表裡之熱利小便二味合為散者取散以散之之義散調絡脈於周身引內外之熱氣悉從小便出矣甘草瀉心湯治狐惑病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲嗄宜此湯蝕於下部則咽乾宜苦參湯洗之蝕於肛者雄黃熏之甘草四兩炙黃芩乾薑人參各三兩半夏半升黃連一兩大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服歌曰傷寒論中甘草瀉心湯卻妙增參三兩匡彼治痞成下利甚此醫狐惑探源方元犀按蟲有情識故能亂有情識之心臟而生疑惑矣蟲為血化之物故仍歸於主血之心方且類聚群分若有妖妄憑藉而然其實不外本身之血氣以為祟耳此方補虛而化濕熱雜以辛苦之味名曰瀉心意深哉苦參湯苦參一升以水一斗煎取七升去滓熏洗日三龐安時傷寒總病論用苦參半斤槐白皮狼牙根各四兩煎熏洗之雄黃熏法雄黃一味為末筒瓦二枚合之燒向肛熏之歌曰苦參湯是洗前陰下蝕從下而衝於上咽乾熱最深更有雄黃熏法在肛門蟲蝕亦良針蝕在肛者發癢俗呼臟頭風元犀按蝕於喉為惑蝕於陰為狐狐惑病乃感風木濕熱之氣而生寒極而化也苦參苦寒氣清屬陽洗之以通陽道雄黃苦寒氣濁屬陰熏之以通濁道但雄黃稟純陽之色取其陽能勝陰之義也熏洗二法按陰陽分配前後二陰此又別其陰中之陰陽也二味俱苦寒而燥者苦以瀉火寒以退熱燥以除濕濕熱退而蟲不生矣赤小豆當歸散治脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也此方主之並治先便後血赤小豆三升浸令芽出曝乾當歸十分上二味杵為散漿水服方寸匕日三服歌曰眼眥赤黑變多般小豆生芽曝令乾豆取三升歸十分杵調漿水日三餐元犀按此治濕熱侵陰之病大抵濕變為熱則偏重於熱少陰主君火厥陰主風木中見少陽相火病入少陰故見微煩默默但欲臥等證病入厥陰故目赤現出火色目眥黑現出火極似水之色主以赤豆去濕清熱解毒治少陰之病當歸導熱養血治厥陰之病下以漿水以和胃氣胃氣與少陰和則為火土合德胃氣與厥陰和則為土木無忤微乎微乎又按或謂是狐惑病或謂是陰陽毒病然二者皆濕熱蘊毒之病金匱列於二證交界處即是承上起下法升麻鱉甲湯治陽毒病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治此湯主之升麻二兩當歸甘草各一兩蜀椒炒去汗一兩鱉甲手指大一片炙雄黃半兩研上六味以水四升煮取一升頓服之老小再服取汗陰毒去蜀椒雄黃歌曰面赤斑紋咽痛毒為陽鱉甲周圍一指量半兩雄黃升二兩椒歸一兩草同行元犀按非常災癘之氣從口鼻而入咽喉故陰陽二毒皆咽痛也陰陽二證不以寒熱臟腑分之但以面赤斑紋吐膿血其邪著於表者謂之陽面目青身痛如被杖其邪隱於表中之裡者為陰升麻鱉甲湯去雄黃蜀椒治陰毒病面目青身痛如被杖咽喉痛五日可治七日不可治此湯主之歌曰身痛咽痛麵皮青陰毒苛邪隸在經陰毒以面不赤而青身不斑紋而痛如被杖別之二證俱咽痛俱五日可治七日不可治即用前方如法服四味照前法服椒黃務去特丁寧蜀椒雄黃二物陽毒用之者以陽從陽欲其速散也陰毒去之者恐陰邪不可劫而陰氣反受損也王晉三云升麻入陽明太陽二經升清逐穢闢百邪解百毒統治溫厲陰陽二病如陽毒為病面赤斑如錦紋陰毒為病面青身如被杖咽喉痛毋論陰陽二毒皆已入營矣但升麻僅走二經氣分故必佐當歸通絡中之血甘草解絡中之毒微加鱉甲守護營神俾椒黃猛劣之品攻毒透表不能亂其神明陰毒去椒黃者太陰主內不能透表恐反動厲毒也肘後千金方陽毒無鱉甲者不欲其守亦恐留戀厲毒也
