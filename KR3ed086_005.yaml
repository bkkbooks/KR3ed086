body:
  text: 卷五黃疸病方茵陳蒿湯歌見長沙方歌括治谷疸寒熱不食食即頭眩心胸不安久久發黃此湯主之茵陳蒿梔子大黃男元犀按太陰濕土也陽明燥土也經云谷入於胃遊溢精氣其上輸下轉藉脾氣之能也谷疸者食谷入胃脾氣不輸濕與熱並久則熏蒸成黃黃成則榮衛流行之機為之阻而不利故有寒熱不食之病經云食入於陰長氣於陽食即頭眩心胸不安者谷入於胃挾濁氣以上干也主以茵陳蒿湯者茵陳稟冬令寒水之氣寒能勝熱佐以梔子味苦瀉火色黃入胃挾大黃以滌胃腸之鬱熱使之屈曲下行則谷疸之邪悉從二便而解矣硝石礬石散治黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水病也腹滿者難治此散主之硝石熬黃礬石燒等分上二味為散大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是其候也歌曰身黃額黑漸及一身之黃俱黑足如烘腹脹如水狀便溏便溏而色黑晡熱叢日晡熱以申屬膀胱酉屬腎也等分礬硝和麥汁女勞疸病奪天工徐忠可云硝能散虛郁之熱為體輕脫而寒不傷脾礬能卻水而所到之處邪不復侵如紙既礬即不受水滲也以大麥粥調服益土以勝水合而用之則散鬱熱解腎毒其於氣血陰陽汗下補瀉等法毫不相涉所以為佳梔子大黃湯治酒疸心中懊憹或熱痛者此湯主之梔子十四枚大黃二兩枳實五枚豉一升上四味以水六升煮取二升分溫三服歌曰酒疸懊憹鬱熱蒸大黃二兩豉一升梔子十四枳枚五上下分消要順承元犀按梔子豆豉徹熱於上枳實大黃除實去滿於下此所謂上下分消順承熱氣也徐忠可云因酒徒陰分大傷故不用燥藥以耗其津亦不用滲藥以竭其液謂熱散則濕不能留也凡治濕熱而兼燥者於此可悟桂枝加黃耆湯見水氣病治黃疸病但當利其小便假令脈浮者當以汗解之宜此湯主之男元犀按黃疸症多由濕熱內鬱而成為病在內也郁在內者宜內解故曰但當利其小便小便通則所郁皆去矣假令脈浮者病在肌表也當外解故曰當以汗解之桂枝湯解肌發表加黃耆助之以黃耆有發汗退黃之專長也豬膏發煎治諸黃疸病豬膏半斤亂髮如雞子大三枚上二味和膏中煎之發消藥成分再服病從小便出千金云太醫校尉史脫家婢黃病服此胃中燥糞下便瘥神驗歌曰諸黃腹鼓大便堅古有豬膏八兩傳亂髮三枚雞子大發消藥熟始停煎男元犀按豬膏主潤燥發灰主通小便故神農本草經有自還神化句最妙謂發為血餘乃水精奉心化血所生今取以煉服仍能入至陰之臟助水精以上奉心臟之神以化其血也沈自南謂寒濕入於血分久而生熱鬱蒸氣血不利證顯津枯血燥皮膚黃而暗晦即為陰黃當以此治之且熱鬱既久陰血無有不傷治者皆宜兼滋其陰故曰諸黃主之又按時醫惑於以人補人之說每遇虛證輒以紫河車配藥余幼時隨侍聞家君與客常談及紫河車一物曰某也服此今反肌肉羸瘦某也服此病反增劇吾行道數十年見有用紫河車者未嘗一效余默識之今省中行道輩遇病人家有餘資或病證虛弱火熾等證即曰非紫河車不能成功也嗚呼是醫也而能活人乎是藥也而能活人乎茵陳五苓散治黃疸病茵陳十分五苓散五分上二味和先食飲服方寸匕日三服歌曰疸病傳來兩解方表裡兩解茵陳末入五苓嘗五苓五分專行水十分茵陳卻退黃男元犀按五苓散功專發汗利水助脾轉輸茵陳蒿功專治濕退黃合五苓散為解鬱利濕之用也蓋黃疸病由濕熱瘀郁熏蒸成黃非茵陳蒿推陳致新不足以除熱退黃非五苓散轉輸利濕不足以發汗行水二者之用取其表裡兩解為治黃之良劑也大黃硝石湯治黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜此湯大黃黃柏硝石各四兩梔子十五枚上四味以水六升煮取二升去滓內硝更煮取一升頓服歌曰自汗表無邪也屎難大便難腹滿時表和裡實貴隨宜硝黃四兩柏同數十五枚梔任指麾男元犀按黃疸病濕熱交郁不得外通今自汗出者外已通也腹滿小便不利而赤者濕熱仍實於裡也實者當下故用大黃除滿去實硝石領熱氣下趨二便又以黃柏除濕退黃梔子散熱解鬱濕熱散二便調則裡氣亦和矣小半夏湯見痰飲治黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者此湯主之元犀按傷寒論云瘀熱在裡身必發黃此云小便色不變欲自利者可知內無瘀熱矣蓋喘滿屬中氣虛弱故曰不可除熱師恐後人誤投寒劑傷中故立小半夏湯以救誤治也用半夏和胃以鎮逆生薑溫理中臟中溫則升降自如而喘滿嘔逆自愈又按若中虛發黃者余每用理中湯真武湯等加茵陳蒿多效小柴胡湯見嘔吐治諸黃腹痛而嘔者宜此湯主之男元犀按嘔者胃氣不和也腹痛者木邪犯胃也小柴胡湯達木鬱和胃氣使中樞運則嘔痛止而黃退矣非小柴胡湯可概治諸黃也小建中湯見血痹虛勞治男子黃小便自利當與虛勞小建中湯男蔚按此言土虛而現出黃色也虛極者宜補土之母四逆輩可與間服然單言男子謂婦人血瘀發黃尚有桃仁承氣湯法也苟屬虛黃亦宜以此湯加當歸益母葉之類也附方瓜蒂散見宿食校者按宋本作瓜蒂湯見暍病治諸黃男元犀按瓜蒂散傷寒論三見俱主胸中之病金匱取之附治諸黃何也蓋黃乃濕熱相併鬱蒸不得外越用瓜蒂散吐而越之使上膈開而下竅達濕熱之邪自有出路矣故曰治諸黃千金麻黃醇酒湯治黃疸麻黃三兩上一味以美酒五升煮取二升半頓服盡冬月用酒春日用水煮之歌曰黃疸病由鬱熱成驅邪解表仗雄兵五升酒煮麻三兩春換水兮去酒烹男元犀按麻黃輕清走表乃氣分之藥主無汗表實症黃疸病不離濕熱之邪用麻黃醇酒湯者以黃在肌表營衛之間非麻黃不能走肌表非美酒不能通營衛故用酒煮以助麻黃髮汗汗出則營衛通而內蘊之邪悉從外解耳驚悸吐衄下血胸滿瘀血方桂枝去芍藥加蜀漆牡蠣龍骨救逆湯歌見長沙方歌括治火邪者此湯主之桂枝甘草生薑大棗蜀漆牡蠣龍骨孫男心典稟按舉火邪冠於方首示人治血先治火也又恐治火專主寒滯之品故拈出此方不寒不滯以立榜樣意深哉傷寒論注解甚詳不必再釋半夏麻黃丸治心下悸者此丸主之半夏麻黃各等分上二味末之煉蜜為丸小豆大飲服三丸日三服歌曰心下悸都緣飲氣維夏麻等分蜜丸醫一升一降存其意神化原來不可知尤在涇云半夏蠲飲氣麻黃髮陽氣妙在作丸與服緩以圖之則麻黃之辛甘不能發越津氣而但能升引陽氣即半夏之苦辛亦不特蠲除飲氣而並和養中氣非仲景神明善變者其孰能與於此哉柏葉湯治吐血不止者此湯主之柏葉乾薑各三兩艾三把上三味以水五升取馬通汁一升合煮取一升分溫再服千金加阿膠三兩亦佳歌曰吐血頻頻不肯休久吐不止凡一切寒溫補瀉之藥服之殆盡矣馬通升許溯源流熱氣伏藏於陰分逼血妄行不止馬屬火取其通之同氣以導之乾薑三兩艾三把二味溫散宣發其熱使行陽分則陰分之血無所逼而守其經矣柏葉行陰三兩求柏葉抑之使降合馬通導之使下則餘燼之瘀一概蠲矣前方歌括之小注頗詳毋庸再釋但愚每用前方病家皆驚疑不能聽今擬加減法用生側柏五錢乾薑炮透一錢五分生艾葉三錢水一杯半馬通一杯煎八分服如無馬通以童便代之馬糞用水化開以布濾汁澄清為馬通水黃土湯治下血先便後血此遠血也亦主吐衄甘草乾地黃白朮附子炮阿膠黃芩各三兩灶中黃土半斤上七味水八升煮取三升分溫三服歌曰遠血先便血續來半斤黃土莫徘徊術膠附地芩甘草三兩同行血證該不僅治下血而吐血衄血與婦人血崩等症俱該在內王晉三云金匱以下血先血後便為近血明指脾絡受傷日滲腸間瘀積於下故大便未行而血先下主之以赤小豆利水散瘀當歸和脾止血若先便後血為遠血明指肝經別絡之血因脾虛陽陷生濕血亦就濕而下行主之以灶心黃土溫燥而去寒濕佐以生地阿膠黃芩入肝以治血熱白朮甘草附子扶陽補脾以治本虛近血內瘀專力清利遠血因虛故兼溫補治出天淵須明辨按此方以灶心黃土易赤石脂一斤附子易炮乾薑二兩炮紫更妙或加側柏葉四兩絡熱加鮮竹茹半斤赤小豆當歸散見狐惑治下血先血後便此近血也此主之男元犀按肝為血海氣通胞中主宣布之權虛則失其權矣曰先血後便者肝失其統不能下宣致胞中之血滲入肛門也近血者胃接二腸胞與腸前後此之最近也若胃腸受濕熱致傷其氣必通於胞中而迫血妄行赤小豆入心清熱解臟毒當歸入肝補虛散郁能宣其血入於經隧也瀉心湯治心氣不足吐血衄血者此湯主之大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之歌曰火熱上攻心氣傷即心氣不足清濁二道血洋洋火逼血從濁道出則為吐血從清道出則為衄血大黃二兩芩連一釜下抽薪請細詳蔚按火邪盛而迫血則錯經妄行血為心液血傷無以養心致心陰之氣不足也故曰心氣不足非心陽之氣不足也用芩連苦寒之品入心清火以培心氣大黃去瘀生新此一補一瀉之法也嘔吐噦下利方吳茱萸湯歌見長沙方歌括治嘔而胸滿者又主幹嘔吐涎沫頭痛者吳茱萸人參生薑大棗受業林禮豐按胸為陽位曠若太空嘔而胸滿者陰邪占居陽位也故重用生薑吳萸之大辛大溫以通胸中之陽以破陰霾之氣佐以人參大棗之一陰一陽以建脾胃之氣以鎮逆上之陰使陽光普照而陰翳自消有何干嘔胸滿吐涎沫之患哉半夏瀉心湯歌見長沙方歌括治嘔而腸鳴心下痞者此湯主之半夏黃芩乾薑人參甘草黃連長男蔚按嘔而腸鳴並無下利心下痞不因誤下何以上下之阻隔若是蓋因飲停心下上逆為嘔下干為腸鳴飲不除則痞不消欲蠲飲必資中氣方中參棗草以培中氣藉半夏之降逆佐芩連以消痞復得乾薑之溫散使痞者通逆者降矣妙在去滓再煎取其輕清上浮以成化痞降逆之用耳黃芩加半夏生薑湯歌見長沙方歌括治乾嘔而利者此湯主之黃芩甘草芍藥大棗生薑半夏男元犀按太陽主開少陽主樞乾嘔者少陽之邪欲從太陽之開而外出也下利者太陽之邪不能從樞外出而反從樞內陷也用黃芩加半夏生薑湯者轉少陽之樞達太陽之氣交上下清裡熱而薑夏又能止嘔降逆也此即小柴胡湯去柴胡人參加芍藥去之者恐其助飲而增嘔加之者取其和胃而降逆伊聖之方鬼神莫測也小半夏湯見痰飲治諸嘔吐谷不得下者此湯主之犀按胃主納穀谷不得下者胃氣虛寒也嘔吐者飲隨寒氣上逆也胃虛飲逆非溫不能散其寒非辛不能降其逆用半夏滌飲降逆生薑溫中散寒使胃氣溫和而嘔吐自平豬苓散治嘔吐而病在膈上後思水者解急與之思水者此散主之豬苓茯苓白朮各等分上三味杵為散飲服方寸匕日三服歌曰嘔余思水與之佳少與之餘以救其液過與須防飲氣乖恐舊飲方去新飲復來豬術茯苓等分搗崇土以逐水不使支飲阻其正津則不渴飲調寸匕自和諧四逆湯歌見長沙方歌括治嘔而脈弱小便復利身有微熱見厥者難治此湯主之附子乾薑甘草男元犀按嘔與熱為陰邪所迫小便利與見厥證屬無陽脈弱者真臟虛寒也用四逆湯徹上下之陰邪招欲散之殘陽引氣血接回其厥外溫經內溫臟面面俱到小柴胡湯歌見長沙方歌括治嘔而發熱者此湯主之柴胡半夏黃芩人參甘草生薑大棗男蔚按嘔而發熱者少陽表症也表未解則內不和故作嘔也陽明主肌肉木邪忤土故作肌熱而嘔用小柴胡湯轉樞以出其邪邪解則熱退而嘔止矣大半夏湯治胃反嘔吐者此湯主之半夏二升人參三兩白蜜一升上三味水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升余分再服歌曰從來胃反責之沖脈上乘半夏二升蜜一升三兩人參勞水煮水揚二百四十遍名勞水又名甘瀾水納沖養液有奇能元犀按此方用水之多取其多煮白蜜去其寒而用其潤俾黏膩之性流連於胃不速下行而半夏人參之力可以徐徐斡旋於中非參透造化之理者不能悟及余遇醫輩偶談及於此不能再三問難便知其庸陋欺人則不復與談矣膈咽之間交通之氣不得降者皆衝脈上行逆氣所作也師以半夏降衝脈之逆即以白蜜潤陽明之燥加人參以生既亡之津液用甘瀾水以降逆上之水液古聖之經方惟師能用之大黃甘草湯治食已即吐者此湯主之大黃四兩甘草二兩上二味以水三升煮取一升分溫再服歌曰食方未久吐相隨食已即吐兩熱衝來自不支胃素有熱食復入之兩熱相沖不停片刻而吐出四兩大黃二兩草上從下取法神奇蔚按師云欲吐者不可下之又云食已即吐者大黃甘草湯下之二說相反何也曰病在上而欲吐宜因而越之若逆之使下則憒亂矣若既吐矣吐而不已是有升無降當逆折之尤在涇云雲霧出於地而雨露降於天地不承則天不降矣可見天地陰陽同此氣機和則俱和乖則並乖人與天地相參故肺氣象天病則多及二陰脾胃大小腸象地病則多及上竅丹溪治小便不通用吐法而開提肺氣使上竅通而下竅亦通與大黃甘草湯之治嘔吐法雖異而理可通也茯苓澤瀉湯治胃反吐而渴欲飲水者此湯主之茯苓半斤澤瀉四兩甘草桂枝各二兩白朮三兩生薑四兩上六味以水一斗煮取三升內澤瀉再煮取二升半溫服八合日三服外臺治消渴脈絶胃反者有小麥一升歌曰吐方未已渴頻加與吐後渴為欲愈者不同亦與豬苓散症未吐而先渴者不同苓八兩生薑四兩誇二兩桂甘三兩術澤須四兩後煎嘉後煮澤瀉取其性補陰而利水不宜煮之太過也徐忠可云此方於五苓散中去豬苓者以胃反證水從吐出中無水氣而渴也加生薑甘草者合苓術等藥以解表裡之虛邪更能和中而止嘔也文蛤湯治吐後渴欲得水而貪飲者此湯主之兼主微風脈緊頭痛文蛤石膏各五兩麻黃甘草生薑各三兩杏仁五十粒大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈歌曰吐而貪飲證宜詳文蛤石膏五兩量十二棗枚杏五十麻甘三兩等生薑元犀按水雖隨吐而去而熱不與水俱去故貪飲不休與思水者不同方中麻黃與石膏並用能深入伏熱之中頃刻透出於外從汗而解熱解則渴亦解故不用止渴之品並主微風脈緊頭痛者以風為陽邪得此涼散之劑而恰對也半夏乾薑散治乾嘔吐逆吐涎沫者此散主之半夏乾薑各等分上二味杵為散取方寸匕漿水一升半煮取七合頓服之歌曰吐而乾嘔沫涎多惟不胸滿不頭痛與吳茱萸湯證不同以虛有微甚邪有高下之別也胃腑不責於厥陰專責於陽明虛寒氣不和姜夏等分磨漿水煮數方小半夏湯生薑半夏湯相類頗分科漿水甘酸能調中引氣止嘔噦生薑半夏湯治病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒無奈者此湯主之半夏半升生薑汁一升上二味以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一嘔止停後服歌曰嘔噦都非喘又非似嘔之狀不似嘔之有物似噦之有聲不似噦之連聲似喘之氣逆不似喘之氣急徹心憒憒莫從違懊憹之甚無可奈何皆飲邪與寒邪摶結於胸一升薑汁半升夏分煮同煎妙入微參與吳茱萸之降濁乾薑之溫中不同蓋彼乃虛寒上逆此乃客邪搏飲也方即小半夏湯不用姜而用汁者以降逆之力少散結之力多也橘皮湯治乾嘔噦若手足厥者此湯主之橘皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈歌曰噦而乾嘔厥相隨氣逆於胸阻四肢乾嘔非胃反厥非無陽乃氣逆於胸不行於四末故也初病氣虛一服驗生薑八兩四陳皮元犀按金匱論噦與方書不同專指厄逆而言也橘皮竹茹湯治噦逆者此湯主之橘皮二斤竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩上六味以水一斗煮取三升溫服一升日三服歌曰噦逆因虛熱氣乘一參五草八姜勝棗枚三十二斤橘生竹青皮即竹茹也刮二升犀按淺注已詳方義不再釋金匱以厄為噦凡厄逆證皆是寒熱錯亂二氣相搏使然故方中用生薑竹茹一寒一熱以祛之人參橘皮一開一闔以分之甘草大棗奠安中土使中土有權而噦逆自平矣此伊聖經方扁鵲丁香柿蒂散即從此方套出也四逆湯見上治下利後腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯桂枝湯見婦人妊娠病大承氣湯見痙病治下利三部脈皆平按之心下堅者宜之治下利脈遲而滑者實也利未欲止急下之宜此湯治下利脈反滑者當有所去下乃愈宜此湯治下利已瘥至其年月日時復發者以病不盡故也宜此湯小承氣湯歌解見長沙方歌括治下利譫語者有燥屎也宜此湯大黃枳實厚朴桃花湯歌解見長沙方歌括治下利便膿血者宜此湯赤石脂乾薑粳米白頭翁湯歌解見長沙方歌括治熱利下重者宜之白頭翁黃連黃柏秦皮梔子豉湯歌解見長沙方歌括治下利後更煩按之心下濡者為虛煩也此主之梔子香豉通脈四逆湯歌解見長沙方歌括治下利清穀裡寒外熱汗出而厥此主之附子乾薑甘草紫參湯治下利肺痛者此湯主之紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服歌曰利而肺痛是何傷濁氣上干責胃腸肺與大腸相表裡八兩紫參三兩草通因通用細推詳腸中積聚是肺氣不行於大腸男蔚按肺為華蓋諸臟之氣皆上熏之惟胃腸之氣下降而不上干於肺故肺為清肅之臟而不受濁氣者也夫肺與腸相表裡腸胃相連下利肺痛者腸胃之濁氣上干於肺也故主以紫參湯本經云紫參主治心腹寒熱積聚邪氣甘草解百毒奠中土使中土有權而肺金受益腸胃通暢而肺氣自安肺氣安則清肅之令行矣何有肺痛下利之病哉訶黎勒散治氣利者此散主之訶黎勒十枚上一味為散粥飲和頓服歌曰訶黎勒散澀腸便氣利還須固後天十個訶黎煨研末調和米飲不須煎男元犀按氣利者肺氣下脫胃腸俱虛氣陷屎下急用訶黎勒澀腸胃以固脫又用粥飲扶中以轉氣氣轉而瀉自止耳附方千金翼小承氣湯見上治大便不通噦數譫語外臺黃芩湯治乾嘔下利者黃芩人參乾薑各三兩桂枝一兩大棗十二枚半夏半升上六味以水七升煮取三升溫分三服歌曰乾嘔利兮責二陽太陽陽明遞相傳也參芩三兩等乾薑桂枝一兩半升夏棗十二枚轉運良男元犀按此即小柴胡湯變法方中以桂枝易柴胡以乾薑易生薑去甘草是也太陽病不解併入陽明陰陽舛錯而為嘔吐下利也方用黃芩乾薑寒溫並進使之入胃以分陰陽又以參棗安胃桂枝祛邪半夏降逆且半夏生當夏半正陰陽交界之門取之以和陰陽陰陽和則中樞轉上下交而嘔利止矣瘡癰腸癰浸淫病方薏苡附子敗醬散治腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿此散主之薏苡仁十分附子二分敗醬五分上三味杵為散取方寸匕以水二升煎減半頓服小便當下歌曰氣血凝內癰阻外膚氣血為內癰所奪不榮於外其身甲錯言如鱗甲之交錯也腹皮雖急按之濡附宜二分苡仁十敗醬還須五分驅王晉三云心氣抑鬱不舒則氣結於小腸之頭阻傳道之去路而為癰腫即內經所謂臟不容邪則還之於腑也故仲景重用薏苡開通心氣榮養心境佐以敗醬化膿為水使以附子一開手太陽小腸之結一化足太陽膀胱之氣務令所化之毒仍從水道而出精微之奧豈庸淺者所能推測耶大黃牡丹湯治腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之脈洪數者膿已成不可下也此湯主之大黃四兩牡丹一兩桃仁五十個冬瓜仁半升芒硝三合上五味以水六升煮取一升去滓內芒硝再煎數沸頓服之有膿當下如無膿當下血歌曰腫居少腹按之即痛如淋小便自調時時發熱自汗出復惡寒大腸癰黃四牡丹一兩從冬瓜子仁半升桃五十芒硝三合泄腸膿王晉三云肺與大腸相表裡大腸癰者肺氣下結於大腸之頭其道遠於上其位近於下治在下者因而奪之也故重用大黃芒硝開大腸之結桃仁丹皮下將敗之血至於清肺潤腸不過瓜子一味而已服之當下血下未化膿之血也若膿已成形肉已壞又當先用排膿散及湯故原文云膿已成不可下也王不留行散治金瘡病王不留行十分八月八日採蒴藋細葉十分七月七日採甘草十八分桑東南根白皮十分三月三日採黃芩二分蜀椒三分厚朴二分乾薑二分芍藥二分上九味王不留行蒴藋桑皮三味燒灰存性各別杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之産後亦可服歌曰金瘡諏吉日按春秋而採不留行桑蒴同王不留行按時而取三物各十分明芩朴芍姜均二分三分之蜀椒十八分之甘草相成尤在涇云金瘡經脈斬絶營衛阻弛治之者必使經脈復行營衛相貫而後已除燒灰外余藥不可日曝火炙方效元犀按金刃傷處封固不密中於風則瘡口無汁中於水則出青黃汁風則發痙水則濕爛成瘡王不留行疾行脈絡之血灌溉周身不使其湍激於傷處桑根皮泄肌肉之風水蒴藋葉釋名接骨草滲筋骨之風水三者皆燒灰欲其入血去邪止血也川椒祛瘡口之風厚朴燥刀痕之濕黃連退肌熱芍藥散惡血乾薑和陽甘草和陰用以為君者欲其入血退腫生肌也風濕去陰陽和瘡口收肌肉生此治金瘡之大要排膿散枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服歌曰排膿散藥本靈臺內經謂先師歃血而盟者是枳實為君十六枚六分芍兮桔二分雞黃一個簡而該元犀按枳桔行氣滯芍藥通血滯從氣血以排之人所易知也妙在揉入雞子黃一枚取有情之物以養心脾之陰則排之之法獨得其本也排膿湯甘草二兩桔梗三兩生薑一兩大棗十枚上四味以水三升煮取一升溫服五合日再服歌曰排膿湯與散懸殊一兩生薑二草俱大棗十枚桔三兩通行營衛是良圖元犀按方中取桔梗生薑之辛又取大棗甘草之甘辛甘發散為陽令毒從陽化而出排之之妙也黃連粉方未見治浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治浸淫瘡此粉主之歌曰浸淫瘡藥末黃連從口流肢順自然若起四肢流入口半生常苦毒牽纏元犀按浸淫瘡系傳染之疾也從口起流向四肢者毒氣外出也故曰可治從四肢起流來入口者毒氣由外入內固結於臟腑之間故曰不可治黃連粉方未見疑即黃連一味為末或敷或服隨宜擇用
