body:
  text: 卷三肺痿肺癰咳嗽上氣方甘草乾薑湯治肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾以此方溫之若服湯已渴者屬消渴甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服歌曰二兩乾薑四炙甘姜須炮透旨須探傷寒金匱各方中只此一方用炮肺中津涸方成痿氣到津隨得指南蔚按肺痿皆為熱證然熱有虛實之不同實熱宜用寒劑而此則亡津液而致虛以虛而生熱若投以苦寒之劑非苦從火化而增熱則寒為熱拒而不納矣此方妙在以甘草之大甘為主佐以炮透之乾薑變其辛溫之性而為苦溫之用於甘溫除大熱成法中又參以活法面面周到神乎神乎射干麻黃湯治咳而上氣喉中水雞聲者主之射干三兩麻黃生薑各四兩細辛紫菀款冬花各三兩大棗七枚半夏半升五味子半升上九味以水一斗二升先煮麻黃兩沸去上沫內諸藥煮取三升分溫三服歌曰喉中咳逆水雞聲三兩干辛款菀行夏味半升棗七粒姜麻四兩破堅城上方主溫此方主散尤在涇云咳而上氣肺有邪則氣不降而反逆也肺中寒飲上入喉間為呼吸之氣所激則作聲如水雞射干紫菀款冬利肺氣麻黃細辛生薑發邪氣半夏降逆氣而以大棗安中五味斂肺恐劫散之藥並傷及其正氣也皂莢丸治咳逆上氣時時吐濁但坐不得眠者此丸主之皂莢八兩刮去皮酥炙上一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服歌曰濁痰上氣坐難眠癰勢將成壅又堅皂莢蜜丸調棗下綢繆須在雨之前蔚按痰有固而不拔之勢故用皂莢開其壅閉滌其汙垢又以棗膏安其胃氣祛邪中不離養正之法厚朴麻黃湯治咳而脈浮者主之厚朴五兩麻黃四兩石膏如雞子大杏仁半升半夏半升乾薑細辛各二兩小麥一升五味半升上九味以水一斗二升先煮小麥熟去滓內諸藥煮取三升溫服一升日三服歌曰杏仁夏味半升量升小麥四麻五朴良三兩姜辛膏雞蛋大脈浮咳喘此方當一本半夏用至六升此遵徐注半夏只用半升元犀按咳而脈浮者內有飲而表有邪也表邪激動內飲飲氣上凌則心肺之陽為之矇蔽故用厚朴麻黃湯宣上焦之陽降逆上之飲方中厚朴寬胸開蔽杏仁通泄肺氣助麻黃解表出邪乾薑五味半夏細辛化痰滌飲小麥保護心君然表邪得辛溫而可散內飲非質重而難平故用石膏之質重者降天氣而行治節使水飲得就下之性而無上逆之患也尤妙先煮小麥補心養液領諸藥上行下出為攘外安內之良圖可知仲師之方無微不到學者當細心體認方得其旨焉澤漆湯治咳而脈沉者此湯主之半夏半升澤漆三升以東流水五斗煮取一斗五升紫參一本作紫菀生薑白前各五兩甘草黃芩人參桂枝各三兩上九味㕮咀內澤漆湯中煮取五升溫服五合至夜盡歌曰五兩紫參姜白前三升澤漆法分煎桂芩參草同三兩半夏半升滌飲專元犀按咳而脈浮者表有邪也表邪不解則干動內飲而為咳用厚朴麻黃湯寬胸解表一鼓而下則外邪內飲一併廓清矣至於咳而脈沉者里不和也裡氣不和由於天氣不降治節不行而水道不通致內飲上逆為咳矣用澤漆湯者君澤漆壯腎陰鎮水逆佐以紫菀白前開肺氣散結氣以達陽氣又以半夏黃芩分陰陽安胃氣以降逆氣並和裡氣生薑桂枝調營衛運陽氣並行飲氣人參甘草奠中土交陰陽以和之猶治水者先修堤岸以杜其泛濫之患也先煮澤漆者取其氣味濃厚領諸藥入腎充腎氣使其吸引有權則能通府以神其妙用焉受業林禮豐按本方主太陽之裡太陽底面便是少陰咳而脈沉者病在太陽之裡少陰之表也蓋太陽主皮毛邪傷皮毛必干於肺肺傷則不能生水而少陰之樞逆於下故立此方君以澤漆者以其氣味苦寒壯腎陰利水而止咳也復用白前宣肺氣黃芩泄肺熱人參補肺虛甘草安脾氣紫菀開結氣桂枝化膀胱半夏降逆生薑滌飲則肺邪可驅肺虛可補腎陰可壯州都可達矣煎法先煮澤漆湯成而後入諸藥者取其領諸藥以神其妙用也麥門冬湯治火逆上氣咽喉不利止逆下氣者此湯主之麥門冬七升半夏一升人參甘草各二兩粳米三合大棗十二枚上六味以水一斗二升煮取六升溫服一升日三夜一服歌曰火逆原來氣上衝一升半夏七升冬參甘二兩粳三合棗十二枚是正宗喻嘉言云於大建中氣大生津液隊中增入半夏之辛溫一味其利咽下氣非半夏之功善用半夏之功擅古今未有之奇矣葶藶大棗瀉肺湯治肺癰喘不得臥者主之葶藶熬令黃色搗丸如雞子大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服歌曰喘而不臥肺癰成口燥口中辟辟乾燥胸疼胸中隱隱痛數實呈肺痿脈數而虛肺癰脈數而實葶藶一丸十二棗雄軍直入奪初萌尤在涇云葶藶苦寒入肺泄氣閉加大棗甘溫以和藥力與皂莢丸之飲以棗膏同法桔梗湯治肺癰咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者此湯主之桔梗一兩甘草二兩上以水三升煮取一升分溫再服則吐膿血也歌曰膿如米粥肺須清毒潰難支藥要輕甘草二兮桔一兩土金合化得生生元犀按肺癰尚未成膿用葶藶瀉之今已潰後用此湯排膿解毒宜緩治不可峻攻也余解見長沙方歌括越婢加半夏湯治咳而上氣此為肺脹其人喘目如脫狀脈浮大者此湯主之麻黃六兩石膏半斤生薑三兩大棗十二枚甘草二兩半夏半升上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服歌曰風水多兮氣亦多水風相搏浪滔滔全憑越婢平風水加夏半升奠巨波元犀按此肺脹原風水相搏熱氣奔騰上蒸華蓋走入空竅故咳而上氣喘目如脫狀證脈浮大者風為陽邪鼓蕩於其間故也方用麻黃生薑直攻外邪石膏以清內熱甘草大棗以補中氣加半夏以開其閉塞之路俾肺竅中之痰涎淨盡終無肺癰之患也小青龍加石膏湯治肺脹咳而上氣煩躁而喘脈浮者心下有水此湯主之小青龍方見痰飲咳嗽再加石膏二兩即此方也歌曰小龍分兩照原方二兩膏加仔細詳水飲得溫方可散欲除煩躁藉辛涼尤在涇云此亦內邪外飲相搏之證但兼煩躁則挾有熱邪特加石膏即大青龍例也然心下有水非溫藥不得開而去之故不用越婢加半夏而用小青龍加石膏寒溫並進水熱俱捐於法為尤密矣魏念庭云師為肺冷而乾燥將痿者立甘草乾薑湯一方為肺熱而枯焦將致痿者立麥門冬湯一方皆預治肺痿之法也師為有表邪而肺郁恐成痿與癰者立射干湯一法為無外邪而氣上逆者恐其成癰立皂莢丸一法為有外邪而預理其肺者立厚朴麻黃湯一法有外邪而復有內熱者立澤漆湯一法皆預治肺氣不令成痿癰之意也又為有外邪而肺脹急立越婢加半夏湯一法有外邪而復有內熱肺脹煩躁者立小青龍加石膏一法亦皆預治肺氣不令成癰痿之意也主治者果能明此選擇比屬而用之又何大患之可成乎及肺癰已成用大棗葶藶瀉肺湯久久吐膿如米粥用桔梗湯不以病之不可為而棄之益見濟人無己之苦心也附方外臺炙甘草湯方出千金見血痹虛勞歌見長沙方歌括治肺痿涎唾多心中溫溫液液者元犀按肺痿涎唾多心中溫溫液液者心陰不足也心陰不足則心陽上熾勢必剋金而成肺痿方用炙甘草湯生津潤燥養陰維陽使陰復而陽不浮則清肅之令自行於肺矣余義見傷寒論不再贅千金甘草湯歌解見長沙方歌括甘草一味以水三斗煮減半溫分三服千金生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴生薑五兩人參三兩甘草四兩大棗十五枚上四味以水七升煮三升分溫三服歌曰肺痿唾涎咽燥殃甘須四兩五生薑棗枚十二參三兩補土生津潤肺腸元犀按中者土也土能生金金之母即資生之源也夫肺痿咳唾涎沫不止咽燥而渴者是中土虛水氣逆阻其津液不能上滋也方用生薑甘草湯者君生薑破陰行陽蒸津液上滋佐以人參入太陰振脾中之陽育肺中之陰又以棗草助之為資生之始令土旺則生金制水矣千金桂枝去芍藥加皂莢湯治肺痿吐涎沫桂枝生薑各三兩甘草三兩大棗十二枚皂莢一枚去皮子炙焦上五味以水七升微火煮取三升分溫三服歌曰桂枝去芍本消陰痰飲挾邪迫肺金一個皂驅黏膩濁桂枝運氣是良針元犀按非辛溫之品不能行陽運氣非甘潤之品不能補土生津君以薑桂之辛溫行陽消陰佐以大棗甘草之甘潤補陰生液若夫開壅塞滌汙垢以淨其涎沫者則皂莢丸有專長耳外臺桔梗白散歌解見長沙方歌括治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗貝母各三分巴豆一分去皮熬研如霜上三味為散強人飲服半錢匕羸者減之病在膈上者吐膿在膈下者瀉出若下多不止飲冷水一杯則定千金葦莖湯治咳有微熱煩滿胸中甲錯是為肺癰葦莖二升薏苡仁半升桃仁五十粒瓜瓣半升上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿歌曰胸中甲錯肺癰成煩滿咳痰數實呈苡瓣半升桃五十方中先煮二升莖元犀按此方以濕熱為主咳有微熱煩滿胸中甲錯者是濕熱之邪結在肺也肺既結則阻其氣血不行而為癰矣方用葦莖解氣分之熱結桃仁泄血分之熱結薏苡利濕清結熱之源瓜瓣排瘀開結熱之路方下注云再服當吐如膿者指藥力行肺癰潰矣葶藶大棗瀉肺湯治肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞此湯主之方見上三日一劑可至三四劑須先服小青龍湯一劑乃進奔豚氣病方奔豚湯治奔豚氣上衝胸腹痛往來寒熱者主之甘草當歸芎藭黃芩芍藥各二兩半夏生薑各四兩生葛五兩甘李根白皮一升上九味以水二斗煮取五升溫服一升日三夜一服歌曰氣衝腹痛號奔豚四兩夏姜五兩葛根歸芍芎芩甘二兩李皮須到一升論按傷寒論云厥陰之為病氣上衝心今奔豚而見往來寒熱腹痛是肝臟有邪而氣通於少陽也魏念庭云上下升降無論邪正之氣未有不由少陽少陽為陰陽之道路也陰陽相搏則腹痛氣升則熱氣降則寒隨奔豚之氣作患也徐忠可云此方合桂枝小柴胡二湯去柴胡去桂枝去大棗以太陽少陽合病治法解內外相合之客邪肝氣不調而加辛溫之芎歸熱氣上衝而加苦泄之生葛李根不治奔豚正所以深於治也尤在涇云苓桂為奔豚主藥而不用者病不由腎發也按服此湯而未愈者用烏梅丸神效桂枝加桂湯歌見長沙方歌括治發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上至心灸其核上各一壯與此湯主之桂枝湯方見婦人妊娠病加桂枝二兩元犀按汗後又迫其汗重傷心氣心氣傷不能下貫元陽則腎氣寒而水滯也加以針處被寒為兩寒相搏必挾腎邪而凌心故氣從少腹上至心發為奔豚也灸之者杜其再入之患用桂枝湯補心氣以解外邪加桂者通腎氣暖水臟而水邪化矣茯苓桂枝甘草大棗湯歌見長沙方歌括治發汗後臍下悸者欲作奔豚此湯主之茯苓甘草大棗桂枝此發汗後心氣不足而後腎氣乘之臍下悸即奔豚之兆也孫男心典稟按因驚而得似只宜以心為治也然自下而上動於腎氣激亂於厥陰而撤守在心實三經同病也仲景三方亦微示其意學者當隅反之余讀金匱茯苓桂枝甘草大棗湯治汗後腎氣凌心即悟桂枝甘草湯叉手冒心之治也更悟桂枝去芍藥加蜀漆牡蠣龍骨救逆湯火逆驚狂之治也因奔豚湯治氣上衝胸即悟烏梅丸氣上衝心之治並四逆散加茯苓心下悸之治也因桂枝加桂湯治氣從少腹上衝心即悟理中湯去朮加桂臍下動氣之治也先祖云仲景書一言一字俱是活法難與不讀書者道亦難與讀書死於句下者道也胸痹心痛短氣方栝蔞薤白白酒湯治胸痹病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數者此湯主之栝蔞實一枚搗薤白半升白酒七升上三味同煮取二升分溫再服歌曰胸為陽位似天空陰氣彌淪痹不通薤白半升栝蔞一個七升白酒奏奇功孫男心典稟按胸為氣息之路若陰邪占居其間則阻其陽氣不通故生喘息咳唾胸背痛諸證寸口者脈之大會陽之位也內經診脈篇云上竟上者胸喉中事也上附上右外以候肺內以候胸中左外以候心內以候膻中此云寸口脈沉而遲關上小緊數寸口即內經所謂上竟上也沉為在裡遲為虛寒關上者即內經所謂上附上也緊為陰邪數為陽氣顯系胸中陽氣被陰寒痹塞阻其前後之氣不相貫通故見以上種種諸證方中用栝蔞開胸結薤白宣心陽尤妙在白酒散痹通陽引氣血環轉周身使前後之氣貫通無礙則胸中曠若太空有何胸痹之患哉栝蔞薤白半夏湯治胸痹不得臥心痛徹背者主之括蔞實一枚搗薤白三兩半夏半升白酒一斗上四味同煮取三升溫服一升日三服歌曰胸背牽疼不臥時上言胸背痛茲又加以不得臥其痛甚矣所以然者有痰飲以為之援也半升半夏一蔞施薤因性濕惟三兩即前湯減薤白只用三兩惡其濕也增入半夏半升取其燥也斗酒同煎滌飲奇元犀按加半夏一味不只滌飲且能和胃而通陰陽枳實栝蔞薤白桂枝湯治胸痹心中痞氣留結在胸胸滿脅下逆搶心者此湯主之人參湯亦主之枳實四枚薤白半升桂枝一兩厚朴四兩栝蔞實一枚搗上五味以水五升先煮枳朴取二升去滓入諸藥再煮數沸分溫再服歌曰痞連胸脅逆攻心尤云心下痞氣是氣痹而成痞也按脅下逆搶心者氣不由中上而從脅逆是中痹而阻諸氣之往來也薤白半升四朴尋一個栝蔞一兩桂四枚枳實撒浮陰尤云宜急通其痞結之氣元犀按枳實厚朴泄其痞滿行其留結降其搶逆得桂枝化太陽之氣而胸中之滯塞自開以此三藥與薤白栝蔞之專療胸痹者而同用之亦去疾莫如盡之旨也人參湯即傷寒論桂枝人參湯人參乾薑白朮桂枝甘草歌曰理中加桂人參湯尤云速復其不振之陽陽復陰邪自散藏休訝補攻分兩道道消小人道消道長君子道長細推詳元犀按此別胸痹證虛實之治實者邪氣摶結蔽塞心胸故不用補虛之品而專以開泄之劑使痹氣開則搶逆平矣虛者心陽不足陰氣上彌故不以開泄之劑而以溫補為急使心氣旺則陰邪自散矣尤在涇云去邪之實即所以安正補陽之虛即所以逐陰是在審其病之久暫與氣之虛實而決之茯苓杏仁甘草湯治胸痹胸中氣塞短氣者此湯主之橘皮枳實生薑湯亦主之茯苓三兩杏仁五十個甘草一兩上三味以水一斗煮取五升溫服一升日三服不瘥更服歌曰痹而短氣孰堪醫甘一苓三淡泄之更有杏仁五十粒水行則氣自順不求奇橘皮枳實生薑湯橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服歌曰痹而氣塞又何施枳實辛香三兩宜橘用一斤姜減半氣開則結自散勿遲疑受業林禮豐按胸痹胸中氣塞者由外邪搏動內飲充塞於至高之分閉其氣路非辛溫不能滌飲散邪非苦泄不能破塞調氣故重用橘皮生薑之大辛大溫者散胸中之飲邪枳實之圓轉苦辛者泄胸中之閉塞譬之寇盜充斥非雄師不能迅掃也至若胸痹短氣乃水邪射肺阻其出氣只用甘草奠安脾氣杏仁開泄肺氣重用茯苓清治節使水順趨於下水行而氣自治譬之導流歸海而橫逆自平也二方並列一用辛開一用淡滲學者當臨機而酌宜焉薏苡附子散治胸痹緩急者此散主之薏苡仁十五兩大附子十枚炮上二味杵為散服方寸匕日三服歌曰痹來緩急屬陽微經云陽氣者精則養神柔則養筋附子十枚切莫違更有薏仁十五兩筋資陰養得陽歸元犀按薏苡稟陽明金氣金能制風肝為風臟而主筋取治筋之緩急人之所知也合附子以大補陽氣其旨甚奧經云陽氣者精則養神柔則養筋是也傷寒論桂枝加附子湯與此相表裡桂枝生薑枳實湯治心中痞諸逆心懸痛者此湯主之桂枝生薑各三兩枳實五兩上三味以水六升煮取三升分溫三服歌曰心懸而痛痞相連痰飲上彌客氣填三兩桂姜五兩枳祛寒散逆並攻堅元犀按心下痞者心陽虛而不布陰邪僭居心下而作痞也尤云諸逆該痰飲客氣而言心懸痛者如空中懸物搖動而痛也此注亦超主以桂枝生薑枳實湯者桂枝色赤補心壯陽生薑味辛散寒降逆佐以枳實之味苦氣香苦主泄香主散為泄痞散逆之妙品領薑桂之辛溫旋轉上下使陽光普照陰邪迅掃而無餘耳烏頭赤石脂丸治心痛徹背背痛徹心者此丸主之烏頭一分炮蜀椒乾薑各一兩附子半兩赤石脂一兩上五味末之蜜丸如桐子大先食服一丸日三服不知稍加服歌曰徹背徹胸痛不休前言心痛徹背尚有止息之時今則陰寒極而痛極矣陽光欲熄實堪憂非薤白之類所能治也烏頭一分五錢附赤石椒姜一兩求喻嘉言曰前後牽連痛楚氣血疆界俱亂若用氣分諸藥轉益其痛勢必危殆仲景用蜀椒烏頭一派辛辣以溫散其陰邪然恐胸背既亂之氣難安而即於溫藥隊中取用乾薑之守赤石脂之澀以填塞厥氣所橫衝之新隊俾胸之氣自行於胸背之氣自行於背各不相犯其患乃除此煉石補天之精義也今人知有溫氣補氣行氣散氣諸法亦知有堵塞邪氣攻衝之訣令胸背陰陽二氣並行不悖也哉附方九痛丸治九種心痛一蟲二注三風四悸五食六飲七冷八熱九去來痛是也而並以一方治之者豈痛雖有九其因於積冷結氣者多耶附子三兩炮生狼牙巴豆去皮熬研如膏乾薑吳茱萸人參各一兩上六味末之煉蜜丸如梧桐子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墜車血疾等證皆主之忌口如常法歌曰九種心疼治不難狼牙吳萸姜巴豆附參安附須三兩餘皆一攻補同行仔細看魏云凡結聚太甚有形之物參雜其間暫用此丸政刑所以濟德禮之窮也腹滿寒疝宿食方附子粳米湯治腹中寒氣雷鳴切痛胸脅逆滿嘔吐者此湯主之附子一枚炮半夏粳米各半升甘草一兩大棗十枚上五味以水八升煮米熟湯成去滓溫服一升日三服歌曰腹中切痛作雷鳴胸脅皆膨嘔吐成附子一枚棗十個半升粳夏一甘烹元犀按腹中雷鳴胸脅逆滿嘔吐氣也半夏功能降氣腹中切痛寒也附子功能驅寒又佐以甘草粳米大棗者取其調和中土以氣逆為病迸於上寒生為病起於下而交乎上下之間者土也如兵法擊其中堅而首尾自應也厚朴七物湯治腹滿發熱十日脈浮而數飲食如故者此湯主之厚朴半斤甘草大黃各三兩大棗十枚枳實五枚桂枝二兩生薑五兩上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤歌曰滿而便閉脈兼浮三兩甘黃八朴投二桂五姜十個棗五枚枳實效優優元犀按病過十日腹滿發熱脈浮而數夫脈浮而發熱邪盛於表也腹滿而脈數邪實於裡也表裡俱病故以兩解之法治之取桂枝湯去芍藥之苦寒以解表邪而和營衛小承氣湯蕩胃腸以泄裡實故雖飲食如故以病已十日之久表裡交病邪不去則正不復權宜之法在所必用也嘔者氣逆於上也故加半夏以降逆下利去大黃者以表邪未解恐重傷胃氣以陷邪也寒多加生薑者以太陽本寒之氣盛重用生薑以散寒也大柴胡湯歌見長沙方歌括按之心下滿痛者此為實也當下之宜此湯柴胡黃芩芍藥半夏枳實大黃大棗生薑元犀按實者當下症大承氣湯尤恐不及況大柴胡湯乎按之心下滿痛者太陽之邪逆而內干少陽樞機阻而不利也用大柴胡湯宣外達內使少陽之氣從太陽之開而解矣厚朴三物湯治痛而便閉者此湯主之厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度歌曰痛而便閉下無疑四兩大黃朴倍之枳用五枚先後煮小承變法更神奇尤在涇云承氣意在蕩實故君大黃三物意在行氣故君厚朴元犀按此方不減大黃者以行氣必先通便便通則腸胃暢而腑臟氣通通則不痛也大承氣湯見痙病治腹滿不減減不足言當下之以上三方雖緩急不同而攻泄則一所謂中滿瀉之於內也傷寒論淺注已解毋庸再贅大建中湯治心胸中大寒痛嘔不能飲食腹中滿上衝皮起出見有頭足上下痛而不可觸近者此湯主之蜀椒二合炒去汗乾薑四兩人參二兩上二味以水四升煮取二升去滓內膠飴一升微火煎取二升分溫再服如一炊頃可飲粥二升後更服當一日食糜粥溫覆之歌曰痛嘔食艱屬大寒腹沖頭足觸之難腑臟經絡皆寒所痹痛甚手不可近也乾薑四兩椒二合參二飴升食粥安受業林禮豐按胸為陽氣出入之位師云心胸中大寒者胸中之陽不宣陰寒之氣從下而上也痛者陰寒結聚也嘔者陰寒犯胃也不能食腹中滿者陰寒犯脾也上衝皮起出見有頭足者陰寒橫逆於中也上下痛而不可觸近者是寒從下上徹上徹下充滿於胸腹之間無分界限陽氣幾乎絶滅矣扼要以圖其權在於奠安中土中焦之陽四布上下可以交泰無虞故主以大建中湯方中重用乾薑溫中土之寒人參飴糖建中焦之氣佐以椒性純陽下達鎮陰邪之逆助乾薑以振中土之陽服後一炊頃飲粥者亦溫養中焦之氣以行藥力也大黃附子湯治脅下偏痛脈緊弦此寒也以溫藥下之宜此湯大黃三兩附子三枚細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服歌曰脅下偏疼脈緊弦若非溫下恐遷延大黃三兩三枚附二兩細辛可補天尤在涇云陰寒成聚非溫不能已其寒非下不能去其結故曰陰寒聚結宜急以溫藥下之赤丸治寒氣厥逆者烏頭二兩炮茯苓四兩細辛一兩半夏四兩上四味末之內真朱為色煉蜜為丸如麻子大先食飲酒下三丸日再服一服不知稍增以知為度歌曰寒而厥逆孰為珍四兩夏苓一兩辛中有烏頭二兩炮蜜丸硃色妙通神元犀按寒氣而至厥逆陰邪盛也方中烏頭細辛以溫散獨盛之寒茯苓半夏以降泄其逆上之氣人所共知也而以硃砂為色其玄妙不可明言蓋以此品具天地純陽之正色陽能勝陰正能勝邪且以鎮寒氣之浮而保護心主心主之令行則逆者亦感化而效順矣大烏頭煎治腹滿脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝寒疝繞臍痛若發則白津出手足厥冷其脈沉緊者此主之犀按白津者汗淡不咸或未睡時泄精漏精大便下如白痰若豬脂狀俱名白津烏頭大者五枚熬去皮不必咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人服五合不瘥明日更服不可一日更服歌曰沉緊而弦痛繞臍白津汗出淡而不咸之名厥逆四肢冷冷悽悽一身惡寒之甚烏頭五個煮添蜜頃刻顛危快挈提元犀按上條與本條俱陰寒內結之症寒為厥氣為逆是積久陰邪聚滿於中也陰邪動而氣逆當為喘嘔不能食矣陰邪結則阻其陽氣不行故肢厥膚冷腹中痛自汗出矣曰寒氣厥逆者乃純陰用事陽氣將亡法宜溫中壯陽大破陰邪非甘溫辛熱之品焉能救其萬一哉當歸生薑羊肉湯治寒疝腹中痛及脅痛裡急者主之當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多加生薑成一片痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之歌曰腹痛脅疼腹胸皆寒氣作主無復界限里急不堪是內之營血不足致陰氣不能相榮而急羊斤姜五並歸三於今豆蔻香砂法可笑依盲授指南加減歌曰寒多增到一斤姜痛嘔宜加橘術商術用一兮橘二兩祛痰止嘔補中方元犀按方中當歸行血分之滯而定痛生薑宣氣分之滯而定痛亦人所共曉也妙在羊肉之多羊肉為氣血有情之物氣味腥膻濃厚入咽之後即與濁陰混為一家旋而得當歸之活血而血中之滯通生薑之利氣而氣中之滯通通則不痛而寒氣無有潛藏之地所謂先誘之而後攻之者也苟病家以羊肉大補而疑之是為流俗之說所囿其中蓋有命焉知幾者即當婉辭而去烏頭桂枝湯桂枝湯見嘔吐噦下利治寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治者抵當烏頭桂枝湯主之烏頭五枚上一味以蜜二斤煎減半去滓以桂枝湯五合解之令得一升後初服五合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病歌曰腹痛內寒身疼外寒肢不仁脾主四肢不仁者寒盛於中無陽氣以溫之也藥攻刺灸治非真或攻其內或攻其外邪氣牽制不服而可以抵當其病者惟有本方桂枝湯照原方煮蜜煮烏頭合用神按解之者溶化也知效也如醉狀外寒方解得吐者內寒已伸故為中病也道光庚辰歲豫大小兒年二十六歲初病時少腹滿兩旁相去有六寸遠結二癰長三寸闊二寸不紅不痛其氣似相通狀大便不通發作寒熱食少醫者紛紜不一或以托裡發散或用下法藥多不效至二三日之後少腹滿漸高脹及腹上及胸脅逆氣衝及咽喉藥物飲食不能下咽氣喘冷汗出四肢厥有一時許竟目直口開豫不得已用大溫回陽之劑灌之其初不能下咽後約進有四分之一其氣略平些蘇回豫查其病症云夜夜泄精或有夢或無夢泄時知覺以手捏之有二三刻久方止夜夜如是後驚不敢睡至雞鳴時亦泄診其脈弦細芤遲余思良久方覺陰寒精自出句生二癰者乃陰寒聚結也治之非大溫大毒之品不能散陰寒之結非大補元氣不能勝陰邪之毒也後用四逆白通理中建中等湯數服病症漸漸而瘥此足見長沙之法運用無窮願後之學者深思而自得焉可附方外臺烏頭湯治寒疝腹中絞痛賊風入攻五臟拘急不得轉側發作有時令人陰縮手足厥逆即大烏頭煎見上外臺柴胡桂枝湯歌見長沙方歌括治心腹卒中痛者柴胡四兩黃芩一兩半人參一兩半半夏二合半大棗十二枚生薑三兩甘草一兩桂枝一兩半芍藥一兩半上九味以水六升煮取三升溫服一升日三服外臺走馬湯治中惡心痛腹脹大便不通巴豆二枚去皮心熬杏仁二枚上二味以綿纏捶令碎熱湯二合捻取白汁飲之當下老少量之通治飛尸鬼擊病歌曰外來異氣傷人多腹脹心疼走馬搓巴杏二枚同搗細沖湯捻汁好驅邪受業門人林士雍按中惡心痛大便不通此實邪也然邪氣雖實亦以體虛而受也是故有虛實寒熱之異不得執一說而定之仲師附走馬湯者以巴豆辛溫大毒除鬼注蠱毒利水穀道杏仁甘苦溫有小毒入肺經肺為天主皮毛中惡腹脹滿者以惡毒不離皮毛口鼻而入故亦從皮毛高原之處而攻之以毒攻毒一鼓而下也此附治寒實大毒之邪氣虛者則不可用矣近世有痧疾病疑即此也昔聞之先業師曰今所謂痧疾者乃六淫邪毒猛惡厲氣所傷凡所過之處血氣為之凝滯不行其症或見身痛心腹脹滿絞痛或通身青紫四肢厥冷指甲色如靛青口噤牙關緊閉不能言語或心中忙亂死在旦夕是邪毒內入矣宜瀉其毒或刺尺澤委中足十趾必使絡脈貫通氣血流行毒邪自解矣愚意輕者用刮痧之法隨即服紫金錠或吐或下或汗出務使經氣流通毒邪亦解或吐瀉不止腹痛肢厥大汗出脈微欲絶者宜用白通湯通脈四逆湯四逆湯等以回陽氣以化陰邪庶毒厲之邪漸消若口不能開者當從鼻孔中灌之集驗良方有云行路之人路中犯此痧疾者不得不用刮痧之法刮後或其人不省者宜用人尿拌土將此土環繞臍中復使同行之人向臍中溺之使中宮溫則氣機轉運血脈流行矣大承氣湯見痙病寸口脈浮而大按之反澀尺中亦微而澀者有宿食也此湯主之數而滑者實也此有宿食下之愈宜此湯下利不欲食者此有宿食當下之宜此湯瓜蒂散歌見長沙方歌括治宿食在上脘當吐之宜此散主之瓜蒂赤小豆香豉
