body:
  text: 卷二瘧病方鱉甲煎丸治瘧病以月一日發當十五日愈設不瘥當月盡解如其不瘥結為癥瘕名曰瘧母急治之宜此丸主之鱉甲十二分炙烏扇三分燒即射干黃芩三分柴胡六分鼠婦三分熬乾薑大黃桂枝石葦去毛厚朴紫葳即凌霄半夏阿膠芍藥牡丹皮䗪蟲各五分葶藶人參各一分瞿麥二分蜂窠四分炙赤硝十二分蜣螂六分熬桃仁二分上二十三味為末取煅灶下灰一斗清酒一斛五升浸灰俟酒盡一半著鱉甲於中煮令泛濫如膠漆絞取汁內諸藥煎為丸如梧子大空心服七丸日三服附千金方用鱉甲十二片又有海藻三分大戟一分無鼠婦赤硝二味歌曰寒熱虛實相來往全憑陰陽為消長天氣半月而一更人身之氣亦相仿否則天人氣再更邪行月盡差可想瘧病一月不能瘥瘧母結成癥瘕象金匱急治特垂訓鱉甲赤硝十二分方中三分請詳言姜芩扇婦朴葦問葳膠桂黃亦相均相均端令各相奮君不見十二減半六分數柴胡蜣螂表裡部一分參藶二瞿麥桃仁牡夏芍䗪蟲分各五方中四分獨蜂窠體本輕清質水土另取灶下一斗灰一斛半酒浸另取納鱉甲酒內煮如膠絞汁煎藥末丸遵古空心七丸日三服每服七丸一日三服也盧子繇痎瘧疏方云漸加二十一丸老瘧得此效桴鼓尤在涇云天氣十五日一更人之氣亦十五日一更氣更則邪當解也否則三十日天人之氣再更而邪自不能留矣設更不愈其邪必假血依痰結為癥瘕僻處脅下將成負固不服之勢故宜急治鱉甲煎丸行氣逐血之藥頗多而不嫌其峻一日三服不嫌其急所謂乘其未集而擊之也王晉三云鱉甲煎丸都用異類靈動之物若水陸若飛潛升者降者走者伏者咸備焉但恐諸蟲擾亂神明取鱉甲為君守之其泄厥陰破癥瘕之功有非草木所能比者阿膠達表熄風鱉甲入里守神蜣螂動而性升蜂房毒可引下䗪蟲破血鼠婦走氣葶藶泄氣閉大黃泄血閉赤硝軟堅桃仁破結烏扇降厥陰相火紫葳破厥陰血結乾薑和陽退寒黃芩和陰退熱和表裡則有柴胡桂枝調營衛則有人參白芍厚朴達原劫去其邪丹皮入陰提出其熱石葦開上焦之水瞿麥滌下焦之水半夏和胃而通陰陽灶灰性溫走氣清酒性暖走血統而言之不越厥陰陽明二經之藥故久瘧邪去營衛而著臟腑者即非瘧母亦可藉以截之按金匱惟此丸及薯蕷丸藥品最多皆治正虛邪著久而不去之病非集血氣之藥攻補兼施未易奏功白虎加桂枝湯治溫瘧者其脈如平身無寒但熱骨節煩疼時嘔此湯主之知母六兩石膏一斤甘草二兩炙粳米六合桂枝三兩上五味以水一斗煮米熟湯成去滓溫服一升日三歌曰白虎原湯論已詳桂加三兩另名方無寒但熱為溫瘧骨節煩疼嘔又妨白虎湯歌見長沙方歌括王晉三云內經論瘧以先熱後寒邪藏於骨髓者為溫疸二瘧仲景以但熱不寒邪藏於心者為溫疸二瘧內經所言是邪之深者仲景所言是邪之淺者也其殆補內經之未逮歟治以白虎加桂枝湯方義原在心營肺衛白虎湯清營分熱邪加桂枝引領石膏知母上行至肺從衛分泄熱使邪之鬱於表者頃刻致和而瘧已至於內經溫疸瘧雖未有方然同是少陰之伏邪在手經者為實邪在足經者為虛邪實邪尚不發表而用清降何況虛邪有不顧慮其亡陰者耶臨證之際化而裁之是所望於用之者矣蜀漆散治瘧多寒者名曰牡瘧此散主之蜀漆燒去腥雲母燒二日夜龍骨各等分上三味杵為散未發前以漿水服半錢匕歌曰陽為痰阻伏心間牡瘧陰邪自往還蜀漆雲龍平等杵先時漿服不逾閒王晉三云邪氣結伏於心下心陽郁遏不舒瘧發寒多熱少不可謂其陰寒也主之以蜀漆散通心經之陽開發伏氣而使營衛調和蜀漆常山苗也苗性輕揚生用能吐雲母在土中蒸地氣上升而為云故能入陰分逐邪外出於表然邪氣久留心主之宮城恐逐邪湧吐內亂神明故佐以龍骨鎮心寧神則吐法轉為和法矣附外臺祕要三方牡蠣湯治牡瘧牡蠣麻黃各四兩甘草二兩蜀漆三兩上四味以水八升先煮蜀漆麻黃去上沫得六升內諸藥煮取二升溫服一升若吐則勿更服歌曰先煎三兩蜀漆四兩麻黃四兩牡蠣二甘後煮良邪郁胸中須吐越驅寒散結並通陽犀按瘧多寒者名牡瘧是痰飲填塞胸中阻心陽之氣不得外通故也趙氏云牡蠣軟堅消結麻黃非獨散寒且能發越陽氣使通於外結散陽通其病自愈柴胡去半夏加栝蔞根湯治瘧病發渴者亦治勞瘧柴胡八兩人參黃芩甘草各三兩栝蔞根四兩生薑三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服歌曰柴胡去夏為傷陰加入蔞根四兩珍瘧病渴因邪灼液蔞根潤燥可生津王晉三云正瘧寒熱相間邪發於少陽與傷寒邪發於少陽者稍異內經言夏傷於大暑秋傷於風病以時作名曰寒瘧金匱云瘧脈多弦弦數者風發正於悽愴之水寒久伏於腠理皮膚之間營氣先傷而後風傷衛故仲景用柴胡去半夏而加栝蔞根其義深且切矣蓋少陽瘧病發渴者由風火內淫劫奪津液而然奚堪半夏性滑利竅重傷陰液故去之而加天花粉生津潤燥豈非與正傷寒半表半裡之邪當用半夏和胃而通陰陽者有別乎柴胡桂薑湯歌見長沙方歌括治瘧寒多微有熱或但寒不熱服一劑如神柴胡半斤桂枝三兩乾薑二兩栝蔞根四兩黃芩三兩甘草二兩牡蠣二兩上七味以水一斗煮取六升去滓再煎取三升溫服一升日三初服微煩復服汗出便愈王晉三云夏月暑邪先傷在內之伏陰至秋復感涼風更傷衛陽其瘧寒多微有熱顯然陰陽無爭故瘧邪從衛氣行陰二十五度內無捍格之狀是營衛俱病矣故和其陽即當和其陰用柴胡和少陽之陽即用黃芩和里用桂枝和太陽之陽即用牡蠣和里用乾薑和陽明之陽即用天花粉和里使以甘草調和陰陽其分兩陽分獨重柴胡者以正瘧不離乎少陽也陰藥獨重於花粉者陰虧之瘧以救液為急務也和之得其當故一劑如神元犀按先賢云瘧病不離少陽少陽居半表半裡之間邪入與陰爭則寒出與陽爭則熱爭則病作息則病止止後其邪仍居於少陽之經愚意外為陽內為陰先寒者邪欲出其氣干於太陽衝動寒水之氣而作也後熱者以胃為燥土脾為濕土濕從燥化則木亦從其化故為熱為汗也汗後木邪仍伏於陽明之中應期而發者土主信也蓋久瘧胃虛得補可愈故先君用白朮生薑湯多效中風歷節方侯氏黑散治大風四肢煩重心中惡寒不足者菊花四十分白朮防風各十分桔梗八分黃芩五分細辛乾薑人參茯苓當歸川芎牡蠣礬石桂枝各三分上十四味杵為散酒服方寸匕日一服初服二十日溫酒調服禁一切魚肉大蒜等常宜冷食六十日止服藥積在腹中不下也熱食即下矣冷食自能助藥力歌曰黑散辛苓歸桂芎參姜礬蠣各三同菊宜四十術防十桔八芩須五分通犀按王晉三云程云來謂金匱侯氏黑散系宋人校正附入唐人之方因逸之其辨論頗詳而喻嘉言獨贊其立方之妙驅風補虛行堵截之法良非思議可到方中取用礬石以固澀諸藥冷服四十日使之留積不散以漸填其空竅則風自熄而不生矣此段議論獨開千古之祕誠為治中風之要旨讀方下云初服二十日用溫酒調是不欲其遽填也後服六十日並禁熱食則一任填空竅矣夫填竅本之內經久塞其空是謂良工之語煞有來歷風引湯除熱癱癇主大人風引少小驚癇瘛瘲日數發醫所不療除熱方巢氏云腳氣宜此湯大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以葦囊盛之取三指撮井花水三升煮三沸溫服一升按方中乾薑桂枝宜減半用之歌曰四兩大黃二牡甘龍姜四兩桂枝三滑寒赤白紫膏六癱癇諸風箇中探元犀按大人中風牽引小兒驚癇瘛瘲正火熱生風五臟亢盛及其歸迸入心其治同也此方用大黃為君以蕩除風火熱濕之邪隨用乾薑之止而不行者以補之用桂枝甘草以緩其勢又用石藥之澀以堵其路而石藥之中又取滑石石膏清金以平其木赤白石脂厚土以除其濕龍骨牡蠣以斂其精神魂魄之紛馳用寒水石以助腎之真陰不為陽光所爍更用紫石英以補心神之虛恐心不明而十二經危也明此以治入臟之風遊刃有餘矣後人以石藥過多而棄之昧孰甚焉防己地黃湯治中風病如狂狀妄行獨語不休無熱其脈浮者防己甘草各一分桂枝防風各三分上四味以酒一杯漬之絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛藥汁更絞地黃汁和分再服歌曰妄行獨語病如狂一分己甘三桂防杯酒漬來取清汁二斤蒸地絞和嘗徐靈胎云生漬取清汁歸之於陽以散邪熱蒸取濃汁歸之於陰以養血此皆治風邪歸附於心而為癲癇驚狂之病與中風風痹自當另看頭風摩散治頭風大附子一枚鹽各等分上附子為散和鹽以方寸匕摩頭上令藥力行歌曰頭風偏痛治如何附子和鹽等分摩軀殼病生須外治馬膏桑引亦同科靈樞馬膏白酒和桂桑鉤鉤之醇酒入椒姜綿絮尉之三十遍而止皆外法也特於此推論之桂枝芍藥知母湯治諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐者桂枝四兩芍藥三兩甘草麻黃各二兩附子二枚炮白朮知母防風各四兩生薑五兩上九味以水七升先煮麻黃減二升去上沫內諸藥同煎取二升溫服七合日三服歌曰腳腫身羸欲吐形芍三姜五是前型知防術桂均須四附子麻甘二兩停元犀按用桂枝湯去棗加麻黃以助其通陽加白朮防風以伸其脾氣芍藥附子知母以調其陰陽多用生薑以平其嘔逆烏頭湯治歷節病不可屈伸疼痛者又主腳氣疼痛不可屈伸麻黃芍藥黃耆甘草各三兩炙烏頭五枚上將烏頭㕮咀以蜜二升煎取一升即出烏頭另四味以水三升煮取一升去滓內蜜煎中更煎之服七合不知盡服之歌曰歷節疼來不屈伸或加腳氣痛維均芍耆麻草皆三兩五粒烏頭煮蜜勻尤在涇云此治寒濕歷節之正法也寒濕之邪非麻黃烏頭不能去而病在筋節又非皮毛之邪可一汗而散者故以黃耆之補白芍之平甘草之緩牽制二物俾得深入而去留邪如衛瓘監鍾鄧入蜀使其成功而不及於亂乃制方之要妙也礬石湯治腳氣衝心礬石二兩上一味以漿水一斗五升煎三五沸浸腳良歌曰腳氣衝心礬石湯煮須漿水浸之良濕收毒解兼除熱補卻靈樞外法彰尤在涇云腳氣之病濕傷於下而氣衝於上礬石味酸澀性燥能卻水收濕解毒毒解濕收上衝自止附方古今録驗續命湯治中風痱身體不能自收持口不能言冒昧不知痛處或拘急不得轉側麻黃桂枝人參甘草乾薑石膏當歸各三兩川芎一兩五錢杏仁四十枚上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風並治但伏不得臥咳逆上氣面目浮腫歌曰姜歸參桂草膏麻三兩均勻切莫差四十杏仁芎兩半古今録驗主風邪元犀按風陽邪也氣通於肝痱閉也風入閉塞其毛竅阻滯營衛不行也蓋風多挾寒初中時由皮膚而入以漸而深入於內郁久則化熱熱則傷陰陰傷內無以養其臟腑外不能充於形骸此即身體不能自收持口不能言冒昧不知痛處所由來也主以古今録驗續命湯者取其祛風走表安內攘外旋轉上下也方中麻黃桂枝乾薑杏仁石膏甘草以發其肌表之風邪兼理其內蘊之熱又以人參當歸芎藭補血調氣領麻黃石膏等藥穿筋骨通經絡調營衛出肌表之邪是則此方從內達外圜轉周身驅邪開痱無有不到稱曰古今録驗續命湯其命名豈淺哉千金三黃湯治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食麻黃五分獨活四分細辛二分黃耆二分黃芩三分上五味以水六升煮取二升分溫三服一服小汗二服大汗心熱加大黃二分腹滿加枳實一枚氣逆加人參三分悸加牡蠣三分渴加栝蔞根三分先有寒加附子一枚歌曰風乘火勢亂心中節痛肢拘絡不通二分耆辛四分獨黃芩三分五麻攻加減歌曰二分黃加心熱端消除腹滿枳枚單虛而氣逆宜參補牡蠣潛陽悸可安增入蔞根能止渴各加三分效堪觀病前先有寒邪在附子一枚仔細看元犀按此附治風中太少通護陰陽驅邪之方也足太陰屬脾主四肢手足拘急惡寒經曰不欲飲食者脾不運也手少陰屬心主神心病則神昏故心亂而發煩熱也足少陰屬腎主筋骨病則百節疼痛也方用麻黃黃耆入太陰宣陽發表淨脾中之邪以黃芩清其心熱以止煩又用細辛獨活入腎穿筋骨以散腎邪此主治之大意也方下氣逆加人參等六法其意未會不敢強解留俟後之學者近效朮附湯治風虛頭重眩苦極不知食味暖肌補中益精氣白朮二兩附子一枚半炮去皮甘草三兩炙上三味銼每五錢匕生薑五片大棗一枚水盞半煎七分去滓溫服歌曰一劑分服五錢匕五片生薑一棗餌枚半附子鎮風虛二術一草君須記喻嘉言云此方全不用風藥但以附子暖其水臟朮草暖其土臟水土一暖則濁陰之氣盡趨於下而頭重苦眩及食不知味之證除矣崔氏八味丸治腳氣上入少腹不仁即腎氣丸見婦人雜病千金越婢加朮湯歌見水氣病治肉極熱則身體津脫腠理開而汗大泄厲風氣下焦腳弱麻黃六兩石膏半斤甘草二兩生薑三兩白朮四兩大棗十二枚上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚元犀按方中朮甘薑棗所以維正氣之根不使陽隨汗出陰隨熱化也惡風加附子者所以預防其亡陽也血痹虛勞方黃耆桂枝五物湯治血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆芍藥桂枝各三兩生薑六兩大棗十二枚上五味以水六升煮取二升溫服七合日三服歌曰血痹如風體不仁桂枝三兩芍耆均棗枚十二生薑六須令陽通效自神元犀按內經云邪入於陰則為痹然血中之邪以陽氣傷而得入亦必以陽氣通而後出上節云宜針引陽氣此節而出此方此以藥代針引之意也又按此即桂枝湯去甘草之緩加黃耆之強有力者於氣分中調其血更妙倍用生薑以宣發其氣氣行則血不滯而痹除此夫倡婦隨之理也桂枝加龍骨牡蠣湯治失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交此湯主之桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩上七味以水七升煮取三升分溫三服歌曰男子失精女夢交坎離救治在中爻桂枝湯內加龍牡三兩相勻要細敲小品云虛弱浮熱汗出者除桂加白薇一兩五錢附子一兩名曰二加龍骨湯徐氏云桂枝湯外證得之能解肌去邪氣內證得之能補虛調陰陽加龍骨牡蠣者以失精夢交為神精間病非此不足以斂其浮越也元犀按徐忠可以龍骨牡蠣斂其浮越四字括之未免以二味為澀藥猶有人之見存也吾於龍之飛潛見陽之變化莫測於海之潮汐見陰之運動不窮龍骨乃龍之脫換所遺牡蠣乃海之精英所結分之為對待之陰陽合之為各具之陰陽亦為互根之陰陽難以一言盡也其治效無所不包余亦恐舉一而漏萬惟能讀本經內經仲景書者自知其妙天雄散天雄三兩白朮八兩桂枝六兩龍骨三兩上四味杵為散酒服半錢匕日三服不知稍增之尤在涇云此疑後人所附為補陽攝陰之用也歌曰陰精不固本之陽龍骨天雄三兩匡六兩桂枝八兩術酒調錢匕日三嘗元犀按此方雖系後人採取然卻認出春之腳陽之家而施以大溫大補大鎮納之劑可謂有膽有識方中白朮入脾以納穀以精生於穀也桂枝入膀胱以化氣以精生於氣也龍骨具龍之性龍能致水以海為家蓋以精歸於腎猶水歸於海而龍得其安宅也深得難經所謂損其腎者益其精之旨然天雄不可得可以附子代之斷不可泥於小家天雄主上附子主下之分小建中湯歌見長沙方歌括治虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥者主之桂枝甘草大棗芍藥生薑膠飴張心在云肺損之病多由五志生火銷鑠金臟咳嗽發熱漸至氣喘側眠消瘦羸瘠虛證交集咽痛失音而不起矣壯水之主以制陽光王冰成法於理則通而多不效其故何歟竊嘗觀於爐中之火而得之炊飯者始用武火將熟則掩之以灰飯徐透而不焦黑則知以灰養火得火之用而無火之害斷斷如也五志之火內燃溫脾之土以養之而焰自息方用小建中湯虛甚加黃耆火得所養而不燃金自清肅又況飴糖為君治嗽妙品且能補土以生金肺損雖難著手不患其不可治也然不獨治肺損凡五勞七傷皆可以通治黃耆建中湯治虛勞裡急諸不足者主之即小建中湯加黃耆一兩五錢氣短胸滿者加生薑腹中滿者去棗加茯苓一兩半及療肺虛損不足補氣加半夏三兩歌曰小建湯加兩半耆諸虛里急治無遺急當甘緩虛當補愈信長沙百世師加減歌曰氣短胸滿生薑好三兩相加六兩討如逢腹滿脹難消加茯兩半除去棗及療肺虛損不足補氣還須開竅早三兩半夏法宜加蠲除痰飲為至寶元犀按虛勞裡急者裡虛脈急也諸不足者五臟陰精陽氣俱不足也經云陰陽俱不足補陰則陽脫瀉陽則陰竭如是者當調以甘藥又云針藥所莫及調以甘藥故用小建中湯君以飴糖甘草本稼穡作甘之味以建立中氣即內經所謂精不足者補之以味是也又有桂枝薑棗之辛甘以宣上焦陽氣即內經所謂辛甘發散為陽是也夫氣血生於中焦中土虛則木邪肆故用芍藥之苦泄於土中瀉木使土木無忤而精氣以漸而復虛勞諸不足者可以應手而得耳加黃耆者以其補虛塞空實腠通絡尤有專長也八味腎氣丸即腎氣丸見婦人雜病治虛勞腰痛少腹拘急小便不利者此丸主之薯蕷丸治虛勞諸不足風氣百疾薯蕷三十分人參七分白朮六分茯苓五分甘草二十分當歸十分芍藥六分芎藭六分乾地黃十分麥冬六分阿膠七分乾薑三分大棗百枚為膏桔梗五分杏仁六分桂枝十分防風六分神麯十分柴胡五分白蘞二分豆黃卷十分上二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑歌曰三十薯蕷二十草三姜二蘞百枚棗桔茯柴胡五分勻人參阿膠七分討更有六分不參差芎芍杏防麥術好豆卷地歸曲桂枝均宜十分和藥搗蜜丸彈大酒服之盡一百丸功可造風氣百疾並諸虛調劑陰陽為至寶魏念庭曰人之元氣在肺人之元陽在腎既剝削則難於遽復矣全賴後天之穀氣資益其生是營衛非脾胃不能宣通而氣血非飲食無由平復也仲景故為虛勞諸不足而兼風氣百疾立此薯蕷丸之法方中以薯蕷為主專理脾胃上損下損至此可以撐持以人參白朮茯苓乾薑豆黃卷大棗神麯甘草助之除濕益氣而中土之令得行矣以當歸芎藭芍藥地黃麥冬阿膠養血滋陰以柴胡桂枝防風去邪散熱以杏仁桔梗白蘞下氣開鬱惟恐虛而有熱之人滋補之藥上拒不受故為散其邪熱開其逆郁而氣血平順補益得納為至當不易之道也酸棗仁湯治虛勞虛煩不得眠酸棗仁二升甘草一兩知母二兩茯苓二兩芎藭一兩上五味以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服歌曰酸棗仁二升先煮湯茯知二兩佐之良芎甘各一相調劑服後恬然足睡鄉尤在涇云人寤則魂寓於目寐則魂藏於肝虛勞之人肝氣不榮故以棗仁補斂之然不眠由於虛煩必有燥火痰氣之擾故以知母甘草清熱滋燥茯苓川芎行氣除痰皆所以求肝之治而宅其魂也大黃䗪蟲丸治五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛者此丸主之大黃十分蒸黃芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾漆一兩虻蟲一升乾地黃十兩水蛭百枚蠐螬百枚䗪蟲半升上十二味末之煉蜜和丸小豆大酒服五丸日三服歌曰乾血致勞窮源委緩中補虛治大旨螬蛭百個䗪半升桃杏虻蟲一升止一兩乾漆十地黃更用大黃十分己三甘四芍二黃芩五勞要證須用此此方世醫勿驚疑起死回生大可恃尤在涇曰風氣不去則足以賊正氣而生長不榮故薯蕷丸為要方乾血不去則足以留新血而滲灌不周此丸為上劑愚按此丸從內經四烏鰂一蘆茹丸悟出但不如四烏鰂一蘆茹丸之平易近人也王晉三云金匱血痹虛勞脈證九條首條是汗出而風吹之血凝於膚而為痹然痹未至於乾血後六條是諸虛不足而成勞然勞亦不至於虛極故治法皆以補虛和營衛去風氣為主方若五勞虛極痹而內成乾血者悉皆由傷而血瘀由血瘀而為乾血也假如陰之五宮傷在五味飲食自倍則食傷於脾西方生燥在臟為肺在志為憂憂患不止則營澀衛除故憂傷於肺以酒為漿以妄為常女子脫血醉入房中則飲傷於肝嗜欲無窮精氣弛壞則房勞傷於腎穀氣不盈上焦不行下脘不通胃熱陰虧則飢傷於胃尊榮人有所勞倦喘息汗出其傷在營若負重努力人亦傷於營營氣屬心故勞傷於心諸傷而胃亦居其一者以五臟皆稟氣於胃為四時之病變死生之要會胃熱液涸則五臟絶陰氣之源而絡痹血乾愈速故飢傷亦列於臟傷之間其第七句是總結諸傷皆傷其經絡營衛之氣也細繹本文云腹滿不能食肌膚甲錯面目黯黑明是不能內谷以通流營衛則營衛凝注瘀積之血牢不可破即有新生之血亦不得暢茂條達惟有日漸羸瘦而成內傷乾血勞其有不死者幾希矣仲景乃出佛心仙手治以大黃䗪蟲丸君以大黃從胃絡中宣瘀潤燥佐以黃芩清肺衛杏仁潤心營桃仁補肝虛生地滋腎燥乾漆性急飛竄破脾胃關節之瘀血虻蟲性升入陽分破血水蛭性下入陰分逐瘀螬蠐去兩脅下之堅血䗪蟲破堅通絡行陽卻有神功故方名標而出之芍藥甘草扶脾胃解藥毒緩中補虛者緩舒也綽也指方中寬舒潤血之品而言也故喻嘉言曰可用瓊玉膏補之勿以耆術補中失卻寬舒胃氣之義附方千金翼炙甘草湯歌見長沙方歌括治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死甘草桂枝生薑人參阿膠大棗麻仁麥冬生地徐云此虛勞中潤燥復脈之神方今人喜用膠麥等而畏用薑桂豈知陰凝燥氣非陽不能化耶魏云仲景用陰陽兩補之法較後人所制十全八珍等湯純美多矣肘後獺肝散治冷勞又主鬼疰一門相染獺肝一具炙乾末之水服方寸匕日三服歌曰獺肝變化少人知一月能生一葉奇鬼疰冷勞宜此物傳尸蟲蠱是專司王晉三云獺肝散奇方也葛稚川治尸疰鬼疰仲景治冷癆皆取用之按獺肝性溫能驅陰邪而鎮肝魂不使魂遊於上而生變動之證蓋疰者邪注於臟也若注於肝則肝為善變之臟邪與魂相合證變便有二十二種其蟲三日一食五日一退變見之證無非陰象而獺肝一月生一葉又有一退葉是其性亦能消長出入以殺隱見變幻之蟲真神品也
