body:
  text: 卷六跌蹶手指臂腫轉筋陰狐疝蛔蟲方藜蘆甘草湯方未見治病人常以手指臂腫動此人身體瞤瞤此湯主之歌曰體瞤臂腫主藜蘆癇痹風痰俱可驅蘆性升提草甘緩症詳跌蹶遍尋無男元犀按痰涎為濕氣所生留滯胸膈之間久則變生無定云病人常以手指臂腫動身體瞤瞤者是氣被痰阻濕無去路或加邪風風行氣亦行引動積痰毒氣此所以群動併發擾亂心君不寧也手足項背牽引痛掣走易不定者心君之令不行肺無以傳其治節也藜蘆性毒以毒攻毒吐久積風痰殺蟲通支節除癇也助用甘草者取甘潤之意以其能解百毒也方雖未見其意不過是耳雞屎白散治轉筋病其人臂腳直脈上下行微弦轉筋入腹者此散主之雞屎白為散取方寸匕以水六合和溫服歌曰轉筋入腹脈微弦肝氣凌脾豈偶然木畜為雞其屎土研來同類妙周旋尤在涇云內經曰諸暴強直皆屬於風轉筋入腹者脾土虛而肝木乘之也雞為木畜其屎反利脾氣故治是病且以類相求則尤易入也蜘蛛散治陰狐疝氣偏有小大時時上下者主之蜘蛛十四枚熬焦桂枝半兩上二味為散取八分一匕飲和服日再蜜丸亦可歌曰陰狐疝氣久難醫腎囊為陰病則氣之腥臭如狐之臊也大小攸偏或偏於左或偏於右一大一小也上下時時時上下人多誤解謂病發則墜而下病息則收而上也熬杵蜘蛛十四個桂枝半兩恰相宜按此病用桂枝不如用肉桂力更大王晉三云蜘蛛性陰而厲隱見莫測可定幽暗之風其功在殼能泄下焦結氣肉桂芳香入肝專散沉陰結疝四時刺逆從論曰厥陰滑為狐疝風推仲景之意亦謂陰狐疝氣是陰邪挾肝風而上下無時也治以蜘蛛如披卻導窾甘草粉蜜湯治蛔蟲病令人吐涎心痛發作有時毒藥不止者主之甘草二兩白粉一兩白蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升瘥即止歌曰蛔蟲心痛吐涎多毒藥頻攻痛不瘥一兩白粉二兩甘草四兩蜜煮分先後取融和按鉛粉性善殺蟲今雜於甘草白蜜之中以大甘掩其本性所謂先誘之而後攻之也烏梅丸歌解見長沙方歌括治蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者此丸主之烏梅細辛乾薑黃連當歸川椒附子桂枝人參黃柏徐忠可云黃連之苦可以安蛔則前甘草與蜜何以亦能安蛔也不知上條之蛔因燥而上逆致使心痛故以白粉殺蛔為主而加甘蜜以潤其燥若蛔厥未嘗攻心且蛔因臟寒而上故以烏梅酸收黃連苦降以收伏降蛔為主而加辛熱而追臟寒所以一心痛而不吐蛔一吐蛔而不心痛此是二條大分別也婦人妊娠病方桂枝湯歌見長沙方歌括治婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠此主之於法六十日當有此證設有醫治逆者卻一月加吐下則絶之桂枝芍藥甘草生薑大棗徐忠可云桂枝湯表證得之為解肌和營衛內證得之為化氣調陰陽時醫以薑桂礙胎戒用汲汲以養血滋陰為事皆不知仲景之法也愚按本章末三句未明願後之學者補續之桂枝茯苓丸治婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者此為症痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其症不去故也常下其症宜此方主之桂枝茯苓丹皮桃仁去皮尖熬芍藥各等分上五味末之煉蜜丸如兔屎大每日食前服一丸不知加至三丸歌曰症痼未除恐害胎胎動於臍下為欲落動於臍上是每月湊集之血因症痼之氣妨害之而下漏也胎安症去悟新裁桂苓丹芍桃同等氣血陰陽本末該受業林禮豐按師云婦人宿有症病者謂未受胎之前本停瘀而有症病也經斷者謂經水淨盡之後交媾而得胎也未及三月而得漏下不止者謂每月湊集之血因宿昔之症痼妨害之而下漏也蓋六月胎動者胎之常而三月胎動者胎之變然胎當居臍下今動在臍上者是本有症痼在臍下逼動其胎故胎不安而動於臍上也因復申言之曰前三月經水利時胎也下血者後斷三月衃也衃者謂每月湊集之血始凝而未痼也所以血不止者其症不去必害其胎去其症即所以安其胎故曰當下其症主以桂苓丸者取桂枝通肝陽芍藥滋肝陰茯苓補心氣丹皮運心血妙在桃仁監督其間領諸藥直抵於症痼而攻之使瘀結去而新血無傷瘀既去則新血自能養胎雖不專事於安胎而正所以安胎也附子湯方未見治婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒少腹如扇所以然者子臟開故也以此湯溫其臟男元犀按太陽主表少陰主裡脈弦發熱者寒傷太陽之表也腹痛惡寒者寒侵少陰之裡也夫胎居臍下與太少相連寒侵太少氣並胞宮迫動其胎故胎愈脹也腹痛惡寒少腹如扇者陰邪盛於內寒氣徹於外故現出陳陳如扇之狀也然胎得暖則安寒則動寒氣內勝必致墜胎故曰所以然者子臟開故也附子湯溫其臟使子臟溫而胎固自無隕墜之虞矣附子湯方未見疑是傷寒附子湯附子茯苓人參白朮芍藥膠艾湯治婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻以此湯主之乾地黃六兩川芎阿膠甘草各二兩艾葉當歸各三兩芍藥四兩上七味以水五升清酒三升合煮取三升去滓內膠令消盡溫服一升日三服不差更作歌曰妊娠腹滿阻胎胞名曰胞阻以胞中氣血虛寒而阻其化育也二兩芎藭草與膠歸艾各三芍四兩地黃六兩去枝梢男元犀按芎藭芍地補血之藥也然血不自生生於陽明水穀故以甘草補之阿膠滋血海為胎産百病之要藥艾葉暖子宮為調經安胎之專品合之為厥陰少陰陽明及衝任兼治之神劑也後人去甘草阿膠艾葉名為四物湯則板實而不靈矣當歸芍藥散治婦人懷妊腹中㽱痛此散主之當歸川芎各三兩芍藥一斤茯苓白朮各四兩澤瀉半斤上六味杵為散取方寸匕酒和日三服歌曰妊娠㽱痛勢綿綿不若寒疝之絞痛血氣之刺痛也三兩歸芎潤且芍藥一斤澤減半術苓四兩妙盤旋男元犀按懷妊腹痛多屬血虛而血生於中氣中者土也土過燥不生物故以歸芎芍藥滋之土過濕亦不生物故以苓朮澤瀉滲之燥濕得宜則中氣治而血自生其痛自止乾薑人參半夏丸治妊娠嘔吐不止此丸主之乾薑人參各一兩半夏二兩上三味末之以生薑汁糊為丸桐子大飲服十丸日三服歌曰嘔吐遷延惡阻名妊娠嘔吐名為惡阻胃中寒飲苦相縈參薑一兩夏雙兩生薑汁糊丸古法精尤在涇云陽明之脈順而下行者也有寒則逆有熱亦逆逆則飲必從之寒逆用此方熱逆用外臺方青竹茹橘皮半夏各五兩生薑茯苓各四兩麥冬人參各三兩為治胃熱氣逆嘔吐之法可補仲師之未備樓全善云余治妊阻病纍用半夏未嘗動胎亦有故無隕之義也當歸貝母苦參丸治妊娠小便難飲食如故者此丸主之當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸歌曰飲食如常小水難妊娠鬱熱液因干苦參四兩同歸貝飲服三丸至十丸男子加滑石半兩男元犀按苦參當歸補心血而清心火貝母開肺鬱而瀉肺火然心火不降則小便短澀肺氣不行於膀胱則水道不通此方為下病上取之法也況貝母主淋瀝邪氣神農本經有明文也哉葵子茯苓散治妊娠有水氣身重小便不利灑淅惡寒起即頭眩此散主之葵子一升茯苓三兩上二味杵為散飲服方寸匕日二服小便利則愈歌曰頭眩惡寒水氣干胎前身重小便難均是小便不利前責之津干此責之水氣水利則濕去身輕矣不侵衛陽則不惡寒矣不犯清道則亦不頭眩矣一升葵子苓三兩米飲調和病即安男元犀按葵子俗人畏其滑胎不必用之中藏經五皮飲加紫蘇水煎服甚效當歸散主治婦人妊娠宜常服之當歸黃芩芍藥川芎各一斤白朮半斤上五味杵為散酒服方寸匕日再服妊娠常服即易産胎無疾苦産後百病悉主之歌曰妊娠常服之劑當以補脾陰為主萬物原來自土生土中涵濕遂生生不窮一斤芎芍歸滋血血為濕化胎尤賴之八兩術一斤芩術本脾藥今協血藥而入脾土土得濕氣則生物又有黃芩之苦寒清肺以主之肺氣利則血不滯所以生物不息大化成方義歌中頗詳不再釋白朮散主妊娠養胎方白朮川芎蜀椒各三分去汗牡蠣上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置歌曰胎由土載術之功養血相資妙有藭土以載之血以養之陰氣上凌椒攝下胎忌陰氣上逆蜀椒具純陽之性陽以陰為家故能攝上焦之熱而下降蠣潛龍性得真詮牡蠣水氣所結味鹹性寒寒以制熱燎原咸以導龍入海此方舊本三物各三分牡蠣闕之徐靈胎云原本無分兩按方下云日三服夜一服者牡蠣用一分可也加減歌曰苦痛芍藥加最美心下毒痛倚芎是吐痛不食心又煩加夏草枚一細使醋漿水須服後吞若還不嘔藥可止不解者以小麥煮汁嘗已後渴者大麥粥喜既愈常服勿輕拋壺中陰陽大燮理按程云來云以大麥粥能調中補脾故服之勿置非指上藥常服也此解亦超方義已詳歌中不再釋婦人産後病方小柴胡湯見嘔吐産婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之孫男心蘭按産婦脈微弱者血虛也血虛而陰不維陽則為孤陽陽獨行於上則頭汗出而冒陽不及於下則下厥陽郁陰傷無以養腸胃故大便堅陰陽不和擾動於中故作嘔而不能食蓋血虛無以作汗故鬱冒不得從汗而解也治之者當審其病情以冒家欲解既不從頭汗而泄必得大汗而解者以小柴胡湯發之使陽從汗泄則鬱開而陰陽和矣此損陽就陰法也大承氣湯見痙病治病解能食七八日更發熱者此為胃實宜此湯主之當歸生薑羊肉湯見寒疝治産後腹中㽱痛者枳實芍藥散主産後腹痛煩滿不得臥者枳實燒令黑勿太過芍藥等分上二味杵為散服方寸匕日三服並主癰膿大麥粥下之歌曰滿煩不臥腹疼頻枳實微燒芍等平羊肉湯方應反看彼治虛痛北治實痛散調大麥粥穩而新男蔚按枳實通氣滯芍藥通血滯通則不痛人所共知也妙在枳實燒黑得火化而善攻停積下以大麥粥和肝氣而兼養心脾是行滯中而寓補養之意故癰膿亦主之下瘀血湯治産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有瘀血著臍下宜此湯亦主經水不利大黃三兩桃仁二十個蟅蟲二十枚去足熬上三味末之煉蜜和為四丸以酒一升煮一丸取八合頓服之新血下如豚肝各本略異歌曰臍中著痛瘀為殃草粒桃仁三兩黃更有蟅蟲二十個酒煎大下亦何傷男元犀按服枳實芍藥而不愈者非積停不通是瘀結不散用此方攻之方中大黃桃仁能推陳下瘀蟅蟲之善攻乾血人盡知之妙在桃仁一味平平中大有功力鬱血已敗而成瘀非得生氣不能流通桃得三月春和之氣而花最鮮明似血而其生氣皆在於仁其味苦又能開泄故直入血中而和之散之逐其舊而不傷其新也大承氣湯見痙病治産後七八日無太陽症少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜此湯主之熱在裡結在膀胱也孫男心典按無太陽症者外無病也脈微實煩躁發熱食則譫語者胃熱也惡露不盡者主太陽之氣隨經也蓋膀胱接胃連於少腹血結其所熱聚其中宜此湯以下瘀除熱陽旦湯治産後中風續續數十日不解頭微疼惡寒時時有熱心下悶乾嘔汗出雖久陽旦症續在者可與之即桂枝湯增桂加附坊本謂加黃芩者未知傷寒論太陽篇中已明其方孫真人及各傢俱誤桂枝湯見婦人妊娠病男元犀按頭痛發熱惡寒汗出太陽表症也心下悶者太陽水邪瀰漫心下而作悶也陽旦湯即桂枝湯倍桂枝加附子雖産後數十日不解其邪仍在於太陽之經故仍用桂枝湯解太陽之表邪加桂以化膀胱之水氣加附子以溫固水臟使經臟氣化則內外之邪出矣傷寒論桂枝加附子治漏汗加桂治氣從少腹上衝心去芍治胸滿俱有明文可據孫真人以桂枝湯加黃芩為陽旦湯其意以心下悶為熱氣誤矣夫有熱氣則當心煩今曰心下悶則非熱可知矣況微惡寒時時有熱乾嘔汗出為太陽桂枝湯之的症蓋太陽底面便是少陰續續至數十日不解顯系少陰之君火微而水寒之氣盛寒氣上凌陽位是以為心下悶之苦故取桂枝湯增桂以扶君主之陽加附子以鎮水陰之逆使心陽振水臟溫則上逆之陰邪不攻而自散矣竹葉湯治産後中風發熱面正赤喘而頭痛者此湯主之竹葉一把葛根三兩防風桔梗桂枝人參甘草各一兩附子一枚炮生薑五兩大棗十五枚上十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大前藥揚去沫嘔者加半夏半升洗歌曰喘熱頭疼面正紅勢欲成痙一兩防桔桂草參同同用一兩葛根三兩生薑五兩附枚一棗十五枚竹葉一把充加減歌曰頸項強用大附抵以大易小不同體嘔為氣逆更議加半夏半升七次洗程云來云證中未至背反張而發熱面赤頭痛亦風痙之漸故用竹葉主風痙防風治內痙葛根療剛痙桂枝治柔痙生薑散風邪桔梗除風痹辛以散之之劑也又佐人參生液以養筋附子補火以致水合之甘草以和諸藥大棗以助十二經同諸風劑則發中有補為産後中風之大劑也竹皮大丸治婦人乳中虛煩亂嘔逆安中益氣生竹茹石膏各二分桂枝白薇各一分甘草七分上五味末之棗肉和丸彈子大飲服一丸日三夜二服有熱倍白薇煩喘者加柏實一分歌曰嘔而煩亂乳中虛謂乳子之時氣虛火勝內亂而上逆也二分石膏與竹茹攻薇桂一分兮草七分棗丸飲服效徐徐加減歌曰白薇退熱絶神異有熱倍加君須記柏得金氣厚且深葉葉西向歸本位實中之仁又寧心煩喘可加一分餌男元犀按血者中之所生也乳者血之所變也血雖生於中焦尤藉厥少之氣傳變而為乳乳中虛者謂乳子去汁過多而致虛也中虛無血奉心則煩心神不安則亂陽氣上升則嘔逆者嘔之甚也用竹皮大丸者以竹茹降逆止嘔白薇除熱退煩石膏通乳定亂重用甘草定安中焦以生津液血無陽氣不運妙以桂枝一味運氣血奉心通乳則嘔逆止而中即自安煩亂退而氣即自益矣復申明其立方之本意曰安中益氣竹皮大丸神哉白頭翁加甘草阿膠湯治産後下利虛極者此湯主之白頭翁阿膠甘草各二兩黃連黃柏秦皮各三兩上五味以水七升煮取三升去滓入阿膠更上微火煎膠煬消取二升溫服一升不愈更服一升歌曰白頭方見傷寒歌二兩阿膠甘草和産後利成虛已極滋阿膠教其陰而且緩甘草緩其急莫輕過男元犀按産後去血過多又兼下利亡其津液其為陰虛無疑茲云虛極理宜大補然歸芎芍地則益其滑而下脫參朮桂耆則動其陽而上逆皆為禁劑須知此虛字指陰虛而言與少陰證陰氣欲絶同義少陰證與大承氣湯急下以救陰與此證與白頭翁大苦以救陰同義此法非薛立齋張景嶽李士材輩以甘溫為主苦寒為戒者所可窺測尤妙在加甘草之甘合四味之苦為苦甘化陰法且久利膏脂盡脫脈絡空虛得阿膠之滋潤合四味之苦以堅之則源流俱清而利自止附方千金三物黃芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黃芩一兩苦參二兩乾地黃四兩上三味以水六升煮取二升溫服一升多吐下蟲歌曰婦人發露得風傷頭不痛兮證可詳肢苦但煩芩一兩地黃四兩二苦參良受業林禮豐按千金云婦人在草蓐是新産時也新産血虛厥陰主血血虛則厥陰之相火動火動則毛竅開因自發去衣被露其身體風邪遂乘虛而襲焉夫風為陽邪四肢為諸陽之本兩陽相搏故四肢苦煩熱也頭痛者風邪從臟而干於腑有欲外出之象故與小柴胡湯達之使其從樞以外出也頭不痛但煩者風邪內郁擾動心包之熱心包火熾血液必傷故主以三黃湯取地黃之甘寒多液者補陰血之虛黃芩苦參之苦寒者瀉心包之熱使火平而風熄陰復而肝寧何有四肢苦煩熱之病哉且心包有熱必挾風木而生蟲故方下云服後多吐下蟲千金內補當歸建中湯治産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹急攣痛引腰背不能飲食産後一月日得服四五劑為善令人強壯宜當歸四兩桂枝三兩芍藥六兩生薑三兩甘草二兩大棗十二枚上六味以水一斗煮取三升分溫三服一日令盡若大虛加飴糖六兩湯成納之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成納阿膠若無當歸以芎藭代之若無生薑以乾薑代之歌曰補中方用建中湯四兩當歸去瘀良産後虛羸諸不足調榮止痛補勞傷加減歌曰服湯行瘀變崩傷二兩阿膠六地黃若厥生薑宜變換溫中止血用乾薑當歸未有川芎代此法微茫請細詳受業林禮豐按産後吸吸少氣不能飲食者病在太陰也腹中刺痛不止或苦少腹急摩痛引腰背者病在厥陰也病屬虛羸不足故用桂枝湯倍芍以助脾氣之輸而刺痛牽引乃血瘀滯著故用當歸以通凝聚之瘀使脾氣有權而得上輸下轉之力故産後一月日得服四五劑為善也令人強壯宜者得補益之功也加飴糖者以中土大虛故用稼穡之味以補中焦之氣血若去血過多崩傷內衄不止則血海空虛陰氣失守故加地黃阿膠之重濁味厚者以養陰名之曰內補者以産後虛羸病偏於內也古聖之方無微不到神乎神乎婦人雜病方小柴胡湯見嘔吐治婦人中風七八日續來寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時此湯主之半夏厚朴湯治婦人咽中如有炙臠者此湯主之半夏一升厚朴三兩茯苓四兩生薑五兩蘇葉二兩上五味以水一斗煮取四升分溫四服日三夜一服歌曰狀如炙臠貼咽中卻是痰凝氣不通半夏一升茯四兩五兩生薑三兩厚朴二兩蘇葉攻男元犀按咽喉者高之極小腹者下之極炙臠貼於咽中者病在上奔豚起於小腹者病在下俱屬於氣但其病有上下之分蓋婦人氣鬱居多或偶感客邪依痰凝結窒塞咽中如有炙臠狀即千金所謂咽中貼貼狀吞之不下吐之不出者今人名曰梅核氣是也主以半夏厚朴湯者方中以半夏降逆氣厚朴解結氣茯苓消痰尤妙以生薑通神明助正祛邪以紫蘇之辛香散其鬱氣郁散氣調而凝結焉有不化者哉後人以此湯變其分兩治胸腹滿悶嘔逆等症名七氣湯以治七情之病甘麥大棗湯治婦人臟燥悲傷欲哭象如神靈所作數欠伸此湯主之甘草三兩小麥一升大棗十枚上三味以水六升煮取三升分溫三服亦補脾氣歌曰婦人臟燥欲悲傷如有神靈太息長數欠伸小麥一升三兩草十枚大棗力相當魏念庭云世醫競言滋陰養血抑知陰盛而津愈枯陽衰而陰愈燥此方治臟燥大法也小青龍湯見痰飲瀉心湯見驚悸治婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之按二方解見傷寒論淺注不再釋溫經湯治婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥此屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以此湯主之吳茱萸三兩當歸芎藭芍藥人參桂枝阿膠丹皮甘草各二兩生薑三兩一本二兩半夏半升一本一升麥冬一升上十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼治崩中去血或月水來多及至期不來歌曰溫經芎芍草歸人膠桂丹皮二兩均八物各二兩半夏半升麥冬倍用生薑吳茱萸三兩對君陳男元犀按方中當歸芎藭芍藥阿膠肝藥也丹皮桂枝心藥也吳茱萸肝藥亦胃藥也半夏胃藥亦沖藥也麥門冬甘草胃藥也人參補五臟生薑利諸氣也病在經血以血生於心藏於肝也沖為血海也胃屬陽明厥陰衝脈麗之也然細繹方意以陽明為主用吳茱萸驅陽明中土之寒即以麥門冬滋陽明中土之燥一寒一熱不使偶偏所以謂之溫也用半夏生薑者以薑能去穢而胃氣安夏能降逆而胃氣順也其餘皆相輔而成溫之之用絶無逐瘀之品故過期不來者能通之月來過多者能止之少腹寒而不受胎者並能治之統治帶下三十六病其神妙不可言矣土瓜根散治帶下經水不利少腹滿痛經一月再見者此散主之土瓜根芍藥桂枝蟅蟲各三分上四味杵為散酒服方寸匕日三服歌曰帶下端由瘀血停不能如期而至以致少腹滿痛月間再見既瘀而不行則前經未暢所行不及待後月正期而至故一見再見不循經經常也言不循常期也蟅瓜桂芍均相等調協陰陽病自寧男元犀按此條單指經水不利之帶下病也經者常也婦人行經必有常期尤云血滿則行血盡復生如月之盈虧海之潮汐必定應期而至謂之信此云經水不利一月再見者乃蓄泄失常則有停瘀之患也然瘀既停必著少腹之間作滿而痛也立土瓜根散者為調協陰陽主驅熱通瘀之法方中桂枝通陽芍藥行陰使陰陽和則經之本正矣土瓜根驅熱行瘀蟅蟲蠕動逐血去其舊而生新使經脈流暢常行不亂也旋覆花湯見積聚治婦人得革脈則半産漏下犀按旋覆花湯金匱中兩見一治積聚症以通肝著之氣一治婦人雜病症以化弦芤為革之脈若革脈不化則必半産漏下但此方非謂漏下時始用耳膠薑湯方闕或云即是乾薑阿膠二味煎服林雲即是膠艾湯千金膠艾湯亦可取用治婦人陷經漏下黑不解者主之歌曰膠薑方闕症猶藏漏下陷經黑色詳薑性溫提膠養血剛柔運化配陰陽道光四年閩都閫府宋公其三媳婦産後三月餘夜半腹痛發熱經血暴下鮮紅次下黑塊繼有血水崩下不止約有三四盆許不省人事牙關緊閉挽余診之時將五鼓矣其脈似有似無身冷麵青氣微肢厥豫曰血脫當益陽氣用四逆湯加赤石脂一兩煎湯灌之不瘥又用阿膠艾葉各四錢乾薑附子各三錢亦不瘥沉思良久方悟前方用乾薑守而不走不能導血歸經也乃用生薑一兩阿膠五錢大棗四枚服半時許腹中微響四肢頭面有微汗身漸溫須臾蘇醒自道身中疼痛余令先與米湯一杯又進前方血崩立止脈復厥回大約膠薑湯即生薑阿膠二味也蓋阿膠養血平肝去瘀生新生薑散寒升氣亦陷者舉之郁者散之傷者補之育之之義也大黃甘遂湯治婦人少腹滿如敦狀小便微難而不渴此為水與血俱結在血室也此湯主之大黃四兩甘遂阿膠各二兩上三味以水三升煮取一升頓服其血當下歌曰小腹敦形敦音對古器也周禮槃以乘血敦以乘食小腹高起之狀相似也小腹胞之室也胞為血海其滿大為蓄血也小水難小水難而不渴亦蓄水也水同瘀血兩瀰漫結在血室大黃四兩遂膠二頓服瘀行病自安男元犀按方中大黃攻血蓄甘遂攻水蓄妙得阿膠本清濟之水伏行地中歷千里而發於古東阿縣之井此方取其以水行水之義也內經謂濟水內合於心用黑騾皮煎造成膠以黑屬於腎水能濟火火熄而血自生此方取其以補為通之義也然甘遂似當減半用之抵當湯歌解見長沙方歌括治婦人經水不利下者主之水蛭虻蟲桃仁大黃男元犀按婦人經水不利下脈證俱實者宜此方否則當養其衝任之源不可攻下抵當湯歌解見長沙方歌括治婦人經水不利下者主之水蛭虻蟲桃仁大黃男元犀按婦人經水不利下脈證俱實者宜此方否則當養其衝任之源不可攻下紅藍花酒治婦人六十二種風腹中血氣刺痛者主之紅藍花一兩上一味酒一大升煎減半頓服一半未止再服歌曰六十二風義未詳腹中刺痛勢倣徨治風先要行其血一兩藍花酒煮嘗淺注引張隱菴侶山堂類辨甚妙不再釋當歸芍藥散見婦人妊娠病治婦人腹中諸疾痛者此方主之犀按婦人腹中諸疾痛者不外氣鬱血凝帶下等症用當歸芍藥散者以肝為血海遂其性而暢達之也方中歸藭入肝解鬱以伸木芍澤散瘀而行水白朮倍土養木妙在作散以散之酒服以調之協諸藥通氣血調營衛以順其曲直之性使氣血和鬱滯散何患乎腹中諸疾痛不除小建中湯見血痹虛勞治婦人腹中痛此主之元犀按婦人腹中痛主以建中湯者其意在於補中生血非養血定痛也蓋血無氣不生無氣不行得建中之力則中氣健運為之生生不息即有瘀痛者亦可平之腎氣丸治婦人病飲食如故煩熱不得臥而反倚息名曰轉胞不得溺也以胞系了戾故致此病此方主之乾地黃八兩山藥山茱萸各四兩茯苓丹皮澤瀉各三兩附子一枚炮桂枝一兩上八味末之煉蜜和丸梧子大酒下十五丸加至二十丸日再服歌曰溫經暖腎整胞宮丹澤苓三地八融四兩萸薯桂附一端教系正腎元充男元犀按胞為血海與膀胱並列於臍下俱懸空之腑其氣相通全賴腎氣充溢於其間其胞系乃正若腎氣不充則胞系了戾胞系了戾必不得溺矣是病雖在胞其權則專在腎也故以腎氣丸主之方中地黃山藥固腎臟之陰山茱萸附子補腎臟之陽桂枝化腑氣茯苓行水道妙在澤瀉形圓善轉俾腎氣旺則能充於胞而系自正系正則小便不利者而可利矣又主虛勞腰痛少腹拘急小便不利者以腰為腎之外府腎司開闔主骨髓為作強之官與膀胱相表裡若少陰精氣虛不能主骨則腰痛少陰陽氣虛不能通腑則少腹拘急小便不利本方補益真陰蒸動水氣使陰平陽祕開闔之樞自如故能治虛勞之病然小便自利者不宜服之以其滲泄而更劫陰也蛇床子散治婦人陰寒溫陰中坐藥此散主之蛇床子上一味末之以白粉少許和合相得如棗大綿裹內之自然溫狼牙湯治少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者此湯洗之狼牙三兩上一味以水四升煮取半升以綿纏箸如繭浸湯瀝陰中日四遍歌曰胞寒外候見陰寒納入蛇床佐粉安此溫胞益陽外治之善法為腎氣丸之佐也更有陰中瘡𧈟爛者乃濕熱不潔而生𧈟也狼牙三兩洗何難除濕熱殺蟲如無狼牙草以狼毒代之膏發煎見黃疸治胃氣下泄陰吹而正喧此穀氣之實也此主之陰吹陰中出聲如大便矢氣之狀小兒疳蟲蝕齒方雄黃葶藶上二味末之取臘月豬脂熔以槐枝綿裹頭四五枝點藥烙之歌曰忽然出此小兒方本治疳蟲蝕齒良葶藶雄黃豬脂點烙闕疑留與後推詳犀按蟲有大小之別隨生處而異其形總不離於風火濕挾厥陰之氣化所生也小兒疳蟲病者多由母氏乳少多飼以火燥乾糧助火之品致小兒煩啼不已動其心包之火火動必熏灼於肝蒸郁從風木化而為蟲夫蟲乃有情之物食有情之血亂有情之心臟起伏無定擾攘攻衝故其證煩熱多汗面青腹脹喜食辛燥之味又有蝕蟲蝕者食蟲也其形不一小者名寸白蟲主風木之氣鬱於中土所生也大者為蝕蟲乃宿食所化也有下蝕者本心包之火協三焦蘊熱而成著於前後二陰名曰陰蝕小如絲色白抑或濕熱下注兼以房事相侵致陰中蝕爛名曰蝕瘡三者皆能使人咽乾而陰中痛癢有蝕齒者生於齒縫齒齦小如絲髮疼痛難忍或名齒蛇或名牙疳能穿肉入骨此症本於外感未解邪火協心火熏灼而成有小魚蟲者如盆魚子初生之小有兩目有生足者有無足者吐出時如魚子動遊狀此乃胸氣不布痰飲協木氣所生故肝著症久而不愈多生紅蝕亦有眼目多壞有鼠婦蟲者形如小鼠婦背有鱗甲色微赤有頭足眼目吐出能跳躍此受惡濁異氣酒性鬱怒合化而生然蟲症雖多而仲師之方未有不備也今舉小兒疳病治法意以補土清金使天氣降而熱氣消則土潤葉茂矣近醫知為疳病不辨寒熱實虛多用毒藥殺蟲而不知其愈殺愈生也本方用雄黃葶藶豬脂槐枝主通氣行血之品點藥烙之如打摩之法去積聚調氣血點之亦即熏之之法也後人有神照法從內經馬膏桑鉤方及此方套出
