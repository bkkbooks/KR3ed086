body:
  text: 卷四五臟風寒積聚方旋覆花湯治肝著其人常欲蹈其胸上先未苦時但欲飲熱者主之旋覆花三兩蔥十四莖新絳少許上三味以水三升煮取一升頓服歌曰肝著之人慾蹈胸肝氣著滯反行其氣於肺所謂橫之病也胸者肺之位欲按摩之以通其氣也熱湯一飲便輕鬆欲飲熱者欲著之氣得熱則散復花三兩蔥十四新絳通行少許從旋覆花鹹溫下氣新絳和血蔥葉通陽新絳查本草無此名按說文絳大赤也左都賦注絳草也可以染色陶弘景曰絳茜草也麻仁丸歌見長沙方歌括治趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約此丸主之麻仁芍藥枳實大黃厚朴杏仁按脈浮者陽盛脈澀者陰傷脾為胃行其津液陰傷則脾無所運矣又約者弱也脾弱不運胃中谷食不化則為積聚症也余義見傷寒論淺注不再贅甘草乾姜茯苓白朮湯一名腎著湯治腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢者此主之甘草白朮各二兩乾薑茯苓各四兩上四味以水五升煮取三升分溫三服腰即溫歌曰腰冷溶溶坐水泉帶脈束於腰間腎著則腰帶病故溶溶如坐水中狀腹中如帶五千錢術甘二兩姜苓四寒濕同驅豈偶然尤在涇云寒濕之邪不在腎之中臟而在腎之外府故其治不在溫腎以散寒而在燠土以勝水若用桂附則反傷腎之陰矣痰飲咳嗽方苓桂朮甘湯歌見長沙方歌括治心下有痰飲胸脅支滿目眩者茯苓桂枝白朮甘草次孫男心蘭稟按心下者脾之部位也飲凌於脾致脾弱不輸不能制水則生痰矣故曰心下有痰飲也胸乃人身之太空為陽氣往來之道路飲邪瀰漫於胸盈滿於脅蔽其君陽溢於支絡故曰胸脅支滿也動則水氣盪漾其變態無常或頭旋轉目冒眩心動悸諸症皆隨其所作也主以苓桂朮甘湯者以茯苓為君蓋以苓者令也使治節之令行而水可從令而下耳桂枝振心陽以退其群陰如離照當空則陰霾全消而天日復明也白朮補中土以修其堤岸使水無氾濫之虞更以甘草助脾氣轉輸以交上下庶治節行心陽振土氣旺轉輸速而水有下行之勢無上凌之患矣腎氣丸見婦人雜病治短氣有微飲當從小便去之苓桂朮甘湯主之此丸亦主之次孫男心蘭稟按微者不顯之謂也飲水也微飲者猶陰霾四布細雨輕飛之狀阻於胸中蔽其往來之氣故曰短氣有微飲者謂微飲阻其氣也經云呼出心與肺吸入肝與腎若心肺之陽虛則不能行水化氣用苓桂朮甘湯振心陽崇土以防禦之使天日明而陰霾散則氣化行矣若腎虛而水泛則吸引無權當用腎氣丸補腎行水使腎氣足則能通腑而化氣氣化則水道通矣余解見婦人雜病不再贅甘遂半夏湯治脈伏其人慾自利利反快雖利心下續堅滿此為留飲欲去故也此湯主之甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服之歌曰滿從利減續還來去者自去續者自續甘遂三枚芍五枚十二枚夏指大草水煎加蜜法雙該尤在涇云雖利心下續堅滿者未盡之飲復注心下也然雖未盡而有欲去之勢故以甘遂半夏因其勢而導之甘遂與甘草相反而同用之者蓋欲其一戰而留飲盡去因相激而相成也芍藥白蜜不特安中抑緩藥毒耳十棗湯歌見長沙方歌括脈沉而弦者懸飲內痛病懸飲者此湯主之芫花甘遂大戟大棗男元犀按脈沉主裡弦主飲飲水凝結懸於胸膈之間致咳引內痛也懸飲既成緩必滋蔓急用十棗湯直達病所不嫌其峻意謂始成而即攻之使水飲下趨而無結痛之患所謂毒藥去病者是也若畏其猛而不敢用必遷延而成痼疾矣大青龍湯歌見長沙方歌括麻黃桂枝甘草杏仁石膏生薑大棗小青龍湯歌見長沙方歌括治病溢飲者當發其汗大青龍湯主之小青龍湯亦主之麻黃芍藥細辛乾薑甘草桂枝半夏五味子男元犀按師云飲水流行歸於四肢當汗而不汗出身體疼重謂之溢飲故病溢飲者以得汗為出路然飲既流溢亦隨人之臟氣寒熱而化飲從熱化故立大青龍湯辛涼發汗以行水飲從寒化故立小青龍湯辛溫發汗以利水二方並列用者當酌其宜焉木防己湯治膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈此湯主之虛者即愈實者三日復發復與不愈者宜此湯去石膏加茯苓芒硝湯主之木防己三兩石膏如雞子大二枚桂枝二兩人參四兩上四味以水六升煮取二升分溫再服歌曰喘滿痞堅面色黧己三桂二四參施膏枚二個如雞子辛苦寒溫各適宜男元犀按防己入手太陰肺肺主氣氣化而水自行矣桂枝入足太陽膀胱膀胱主水水行而氣自化矣二藥並用辛苦相需所以行其水氣而散其結氣也水行結散則心下痞堅可除矣然病得數十日之久又經吐下可知胃陰傷而虛氣逆故用人參以生既傷之陰石膏以鎮虛逆之氣陰覆逆平則喘滿面黧自愈矣此方治其本來救其失誤面面俱到木防己去石膏加茯苓芒硝湯木防己三兩桂枝二兩茯苓人參各四兩芒硝三合上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈歌曰四兩苓加不用膏芒硝三合展奇韜氣行復聚知為實以軟磨堅自不勞魏念庭云前方去石膏加芒硝者以其邪既散而復聚則有堅定之物留作包囊故以堅投堅而不破者即以軟投堅而必破也加茯苓者亦引飲下行之用耳澤瀉湯治心下有支飲其人苦冒眩者主之澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服歌曰清陽之位飲邪乘眩冒頻頻苦不勝澤五為君術二兩補脾制水有奇能受業林禮豐按心者陽中之陽頭者諸陽之會人之有陽氣猶天之有日也天以日而光明猶人之陽氣會於頭而目能明視也夫心下有支飲則飲邪上蒙於心心陽被遏不能上會於巔故有頭冒目眩之病仲師特下一苦字是水陰之氣盪漾於內而冒眩之苦有莫可言傳者故主以澤瀉湯蓋澤瀉氣味甘寒生於水中得水陰之氣而能利水一莖直上能從下而上同氣相求領水陰之氣以下走然猶恐水氣下而復上故用白朮之甘溫崇土製水者以堵之猶治水者之必築堤防也古聖用方之妙有如此者今人反以澤瀉利水伐腎多服傷目之說疑之其說創於宋元諸醫而李時珍張景岳李士材汪訒庵輩和之貽害至今弗熄然天下人信李時珍之本草者殆未讀神農本草經耶余先業師神農本經小注最詳願業斯道者三複之而後可厚朴大黃湯治支飲胸滿者此湯主之厚朴一尺大黃六兩枳實四枚上三味以水五升煮取二升分溫再服歌曰胸為陽位似天空支飲填胸滿不通尺樸為君調氣分四枚枳實六黃攻元犀按支飲者有支派之別也胸乃陽氣之道路飲為陰邪言胸滿者乃陰占陽位填塞胸中而作滿也君以厚朴者味苦性溫為氣分之藥苦降溫開使陽氣通則胸中之飲化矣枳實形圓臭香香以醒脾圓主旋轉故用以為佐繼以大黃直決地道地道通則飲邪有不順流而下出哉又按小承氣湯是氣藥為臣此湯是氣藥為君其意以氣行而水亦行意深矣三物湯小承氣湯與此湯藥品俱同其分兩主治不同學者宜細心研究葶藶大棗瀉肺湯見肺癰支飲不得息此主之犀按肺主氣為出入之路師云支飲不得息者乃飲邪壅肺填塞氣路矣方用葶藶泄肺氣以開之大棗補脾土以納之則氣息暢矣小半夏湯治嘔家本渴渴者為欲解今反不渴心下有支飲故也此湯主之半夏一升生薑半斤上二味以水七升煮取一升半分溫再服歌曰嘔家見渴飲當除飲從嘔去故渴不渴應知支飲居飲能制燥今以不渴知心下有支飲半夏一升姜八兩源頭探得病根鋤男元犀按神農本草經載半夏之功治甚大仲師各方無不遵法用之凡嘔者必加此味元明後誤認為治痰專藥遂有用朴硝水浸者有用皂角水及姜水浸者有用白芥子和醋浸者市中用烏梅甘草青鹽等製造者更不堪入藥近日通用水煮乘熱以白礬拌曬切片者皆失其本性不能安胃止嘔宜從古法以湯泡七次去涎用之或畏其麻口以薑汁甘草水浸透心洗淨曬乾再以清水浸三日每日換水蒸熟曬乾用之支飲之症嘔而不渴者旁支之飲未盡也用小半夏湯者重在生薑散旁支之飲半夏降逆安胃合之為滌飲下行之用神哉己椒藶黃丸治腹滿口舌乾燥此腸間有水氣此方主之防己椒目葶藶大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩歌曰腸中有水口帶干水既聚於下則無復潤於上後即水飲之入皆趨於下不能滋其燥且以益其滿矣腹裡為腸按部觀腹裡為大小二腸部位大腸主津液今作滿為水氣所傷則津液不能上達於口舌故乾燥椒己藶黃皆一兩蜜丸飲服日三餐程氏曰防己椒目導飲於前大黃葶藶推飲於後前後分消則腹滿減而水飲行脾氣轉而津液生矣與上方互異處當求其理小半夏加茯苓湯治卒嘔吐心下痞膈間有水眩悸者主之半夏一升生薑半斤茯苓四兩上三味以水七升煮取一升五合分溫再服歌曰嘔吐悸眩痞又呈四苓升夏八姜烹膈間有水金針度澹滲而辛得病情男元犀按水滯於心下則為痞水凌於心則眩悸水阻胸膈則陰陽升降之機不利為嘔吐方用半夏降逆生薑利氣茯苓導水合之為滌痰定嘔之良方五苓散歌見長沙方歌括治瘦人臍下有悸吐涎沫而顛眩此水也此方主之豬苓澤瀉白朮茯苓桂枝喻嘉言云水飲下鬱於陰中挾其陰邪鼓動於臍則為悸上入於胃則吐涎沫及其鬱極乃發直上頭目為顛為眩五苓散利水以發汗為分利表裡陰陽之法男元犀按臍下動氣去朮加桂仲師理中丸法也茲何以臍下悸而用白朮乎不知吐涎沫是水氣盛必得苦燥之白朮方能制水顛眩是土中濕氣化為陰霾上彌清竅必得溫燥之白朮方能勝濕證有兼見法須變通附方外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩枳實二兩橘皮二兩半生薑四兩上六味以水六升煮取一升八合分溫三服如人行八九里通作一服進之歌曰中虛不運聚成痰枳二兩參苓朮各三姜四橘皮二兩半補虛消滿此中探男元犀按人參乃水飲症之大忌此方反用之蓋因自吐出水後虛氣作滿脾弱不運而設也方中人參補脾氣白朮健胃氣生薑溫中散寒氣茯苓降水氣橘皮枳實化痰運參術徐徐斡旋於中以成其補虛消食散滿之妙用此方施於病後調養則可若痰飲未散者切不可用十棗湯見上咳家其脈弦為有水此主之支飲家咳煩胸中痛者不卒死至一百日或一歲宜此湯主之男蔚按凡人將咳之頃喉間似哽非哽似癢非癢若有若無者皆飲氣干之也飲氣一干則咳嗽作矣除勞傷積損脈極虛極細者別有治法若咳而脈弦皆為水飲皆宜十棗湯攻之若診得弦脈畏不敢用其飲動肺則咳動心則煩搏擊陽氣則胸痛即至一百日一歲之久亦以此方為背城之借然亦危矣此言治法當如是也非謂必用其方以致敗名取怨喻云咳嗽必因於痰飲而五飲之中獨膈上支飲最為咳嗽根底外邪入而合之固嗽即無外邪而支飲漬入肺中自令人咳嗽不已況支飲久蓄膈上其下焦之氣逆沖而上者尤易上下合邪也夫以支飲之故而令外邪可內下邪可上不去支飲其咳終無愈期矣去支飲用十棗湯不嫌其峻豈但受病之初即蓄病已久亦不能捨此而別求良法小青龍湯見上咳逆倚息不得臥此方主之元犀按十棗湯專主內飲而不及外邪此方散外邪滌內飲為內外合邪之的方也以下五方皆本此方為加減桂苓五味甘草湯治青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與此湯治其氣衝按脈沉微支厥痹面如醉氣衝時覆冒似少陰陰陽不交之症學者可於臨症時參辨之則可桂枝茯苓各四兩五味半升甘草三兩炙上四味以水八升煮取三升去滓分溫三服歌曰青龍卻礙腎元虧腎元虧而誤服之則動衝任之火致變為以下諸證上逆下流又冒時氣從少腹上衝胸咽或面熱如醉或熱氣流於兩股或小便難而昏冒忽上忽下在陽無主如電光之閃爍無定味用半升苓桂四甘三扶土鎮沖宜男元犀按仲師五味子必與乾薑同用獨此方不用者以誤服青龍之後沖氣大動取其靜以制動故暫停不用也尤云苓桂能抑沖氣使之下行然逆氣非斂不降故以五味之酸斂其氣土厚則陰火自伏故以甘草之甘補其中也桂苓五味甘草去桂加姜辛湯治服前藥沖氣即低而反更咳胸滿者此湯主之茯苓四兩甘草乾薑細辛各三兩五味子半升上五味以水八升煮取三升去滓溫服半升日三服歌曰沖氣低時得桂苓之力而低咳寒飲漬肺則咳滿寒飲貯胸則滿頻前方去桂益姜辛兩次用桂而邪不伏以桂能去陽分凝滯之寒不能驅臟腑沉匿之寒必得乾薑細辛大辛大熱方能泄胸中之滿而止咳也姜辛三兩依原法原法通微便出新苓甘五味姜辛半夏湯治服前藥咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水茯苓四兩甘草細辛乾薑各三兩半夏五味各半升上六味以水八升煮取三升去滓溫服半升日三服歌曰咳滿平時咳滿之病得姜辛而除渴又加旋而不渴飲餘邪渴者以辛姜之熱動之也渴反止者有餘飲以制燥也飲去則渴飲來則不渴而冒嘔冒而必嘔半升夏增入前方效可誇男元犀按前言氣衝是真陽上奔必用桂苓招納之此言氣衝是熱藥鼓之只用半夏以降逆則愈且冒而嘔半夏為止嘔之神藥也一本去甘草恐甘而助嘔也苓甘五味姜辛半夏杏仁湯治服前藥水去嘔止其人形腫者肺氣不行也加杏仁主之其症應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃髮其陽故也茯苓四兩甘草乾薑細辛各三兩五味半夏杏仁各半升上七味以水一斗煮取三升去滓溫服半升日三服歌曰咳輕嘔止腫新增面腫須知肺氣凝前劑杏加半升煮可知一味亦規繩男元犀按形氣肺也肺主皮毛為治節之官形腫者肺氣不行凝聚不通故也加杏仁者取其苦泄辛開內通肺氣外散水氣麻黃亦肺家之藥何以不用慮其發越陽氣而重傷津液也苓甘五味姜辛夏杏大黃湯治面熱如醉此為胃熱上衝熏其面以前方加大黃以利之茯苓四兩甘草乾薑細辛各三兩五味半夏杏仁各半升大黃三兩上八味以水一斗煮取三升去滓溫服半升日三服歌曰面熱如醉火邪殃胃熱上衝熏其面前劑仍增三兩黃驅飲辛溫藥一派別能攻熱制陽光男元犀按與沖氣上逆發熱如醉者不同彼因下焦陰中之陽虛此不過肺氣不利滯於外而形腫滯於內而胃熱但以杏仁利其胸中之氣大黃泄其胃中之熱則病愈矣從咳逆倚息起至此六方五變為結局學者當留心細認徐忠可云以上數方俱不去薑辛即面熱如醉亦不去何也蓋以二味最能泄滿止咳凡飲邪未去須以二味刻刻預防也按孫真人最得此秘觀麥門冬湯五味子湯補肺湯可見余於此湯凡桑白皮阿膠天冬麥冬茯苓龍骨牡蠣之類隨證加入其效無比小半夏加茯苓湯見上先渴後嘔為水停心下此屬飲家此湯主之犀在直趨庭聞訓曰此一節與上文似不相屬而不知先生治咳著眼在水飲二字故於完篇之後隨口逗出此言外之提撕也今試暢發其義蓋飲水邪也其本起於足太陽足少陰二經以二經為水之專司也然太陽之水為表水膚腠不宣水氣以致壅塞而為飲則以小青龍發之發之不能盡者當從太陽之裡而疏淪之十棗湯是也少陰之水為里水下焦有寒不能制伏本水以致逆行而為飲則以真武湯鎮之鎮之而不盡服者當從少陰之表而化導之苓桂朮甘湯是也更進一步從中土以堤防之從高原而利導之熟則生巧不能以楮墨傳也近時喜用滑套之方以六安煎金沸草湯居於青龍之上濟生腎氣丸七味地黃丸駕乎真武之前大體不礙者吾亦姑如其說究竟不如先生之原方效如桴鼓也消渴小便不利淋病方腎氣丸見婦人雜病治男子消渴小便反多以飲一斗小便亦一斗此丸主之尤在涇云水液屬陰非氣不至氣雖屬陽中實含水水與氣非一亦非二也方中若無桂附何以振作腎中頹落之陽遊溢精氣上輸脾肺邪五苓散見痰飲治脈浮小便不利微熱消渴者宜利小便發汗又治渴欲飲水水入則吐者名曰水逆尤在涇云熱渴飲水水入不能已其熱熱亦不能消其水水與熱結熱浮水外故小便不利微熱消渴此利其與熱俱結之水去其水外浮溢之熱熱除水去渴當自止又熱已消而水不行則逆而成嘔乃消渴之變證故水逆亦主之文蛤散歌見長沙方歌括治渴欲飲水不止者此散主之文蛤男元犀按與傷寒論文蛤散症不同傷寒論云肉上粟起反不渴者水寒浸肺湧於外遏於上其熱被卻不得出也文蛤入肺降肺氣除濕熱利小便取其以殼治殼之義也本節云渴欲飲水不止者上無水濕遏郁中有燥熱上焚脾干胃燥不能生津滋渴飲水不止者燥甚也水性輕和不能生津潤燥文蛤則味鹹寒能育陰潤燥灑除熱氣下出小便燥熱除陰液長而渴飲平矣栝蔞瞿麥丸治小便不利者有水氣其人若渴者宜之薯蕷茯苓各三兩栝蔞根二兩附子一枚炮瞿麥一兩上五味末之煉蜜丸如梧子大飲服二丸日三服不知增至七八丸以小便利腹中溫為知歌曰小便不利渴斯成水氣留中液不生下焦火衰中焦土弱水氣存於中阻其上下之津液不行三兩蕷苓瞿一兩一枚附子二蔞行男元犀按內經云膀胱者州都之官津液存焉氣化則能出矣余於氣化能出之義而借觀之燒酒法益恍然悟矣酒由氣化端賴鍋下之火力方中附子補下焦之火即其義也酒釀成之水穀收於鍋內而蒸之其器具亦須完固方中茯苓薯蕷補中焦之土即其義也鍋下雖要加薪而其上亦要頻換涼水取涼水之氣助其清肅以下行則源源不竭方中栝蔞根清上焦之熱即其義也至於出酒之竅道雖云末所當後亦須去其積垢而通達方中瞿麥一味專通水道清其源而並治其流也方後自注腹中溫三字大有深義蒲灰散小便不利者此散主之滑石白魚散茯苓戎鹽湯並主之蒲灰半分滑石三分上三味杵為散飲服方寸匕日三服歌曰小便不利用蒲灰平淡無奇理備該半分蒲灰三分滑能除濕熱莫疑猜滑石白魚散滑石亂髮燒白魚各二分上三味杵為散飲服方寸匕日三服歌曰滑石余灰亂髮用火燒名血餘灰與白魚專司血分莫躊躇藥皆平等擂調飲水自長流不用疏茯苓戎鹽湯茯苓半斤白朮二兩戎鹽彈丸大一枚上三味先將茯苓白朮煎成入戎鹽再煎分溫三服歌曰一枚彈大取戎鹽茯用半斤火自潛更有白朮二兩佐源流不滯自濡沾尤在涇云蒲香蒲也寧原云香蒲去濕熱利小便合滑石為清利小便之正法也別錄云白魚開胃下氣去水氣血餘療轉胞小便不通合滑石為滋陰益氣以利其小便者也綱目戎鹽即青鹽鹹寒入腎以潤下之性而就滲利之職為驅除陰分水濕之法也仲師不詳見證而並出三方以聽人之隨證審用殆所謂引而不發者歟按蒲灰散主濕熱氣分滑石白魚散主血分茯苓戎鹽湯入腎除陰火二散可療外瘡多效白虎加人參湯即白虎人參湯見暍病治渴欲飲水口乾燥者主之男元犀按小便不利者水病也天水一氣金為水母金氣不行則水道不通曰渴欲飲水口乾燥者火甚燥金水源將竭也治求其本故用白虎加人參湯潤燥金補水源使天氣降而水氣行則渴燥自止矣豬苓湯歌見長沙方歌括治脈浮發熱渴欲飲水小便不利者宜之豬苓茯苓阿膠滑石澤瀉男元犀按此與五苓散症迥別五苓散主脾不轉輸而水停故發汗利水為兩解表裡法此則胃熱甚而津液干故以清熱而滋燥用育陰利水法二者只差一粟學者自當細察焉水氣病方越婢加朮湯即越婢湯加白朮四兩方見下治里水一身面目黃腫其脈沉小便不利故令病水假令小便自利此亡津液故令渴此湯主之歌曰里水脈沉面目黃水風相搏濕為殃專需越婢平風水四兩術司去濕良男元犀按水被熱蓄氣為濕滯致外不得通陽而作汗內不能運氣而利水故令病水云假令小便自利三句疑非里水病也越婢湯發肌表之邪以清內蓄之熱加白朮運中土除濕氣利其小便此分消表裡法也或云越婢散肌表之水加白朮止渴生津也按豈有小便自利亡津液而作渴者仍用此湯不顧慮其重傷津液乎防己黃耆湯見濕病治風水脈浮身重汗出惡風者此湯主之男元犀按惡風者風傷肌腠也身重者濕傷經絡也脈浮者病在表也何以不用桂枝麻黃以發表祛風而用防己黃耆以補虛行水乎蓋以汗出為腠理之虛身重為土虛濕勝故用黃耆以走表塞空棗草白朮以補土勝濕生薑辛以去風溫以行水重用防己之走而不守者領諸藥環轉於周身使上行下出外通內達迅掃而無餘矣越婢湯治風水惡風一身悉腫脈浮不渴續自汗出無大熱此湯主之麻黃六兩石膏半斤生薑三兩甘草二兩大棗十二枚上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚風水加朮四兩歌曰一身悉腫屬風多水為風翻湧巨波二草三姜十二棗石膏八兩六麻和男元犀按惡風者風也一身悉腫者水也脈浮者風發也風為陽邪風動則水火戰而浪湧矣湧於上則不渴湧於外則續自汗出云無大熱者熱被水蔽不得外越內已醞釀而成大熱矣前章云身重為濕多此章云一身悉腫為風多風多氣多熱亦多系屬猛風故君以石膏重鎮之品能平息風浪以退熱引麻黃直越其至陰之邪協生薑散肌表之水一物而兩握其要也又以棗草安中養正不慮其過散傷液所以圖萬全也防己茯苓湯治皮水四肢腫水氣在皮膚中四肢聶聶動者此湯主之防己黃耆桂枝各三兩茯苓六兩甘草二兩上五味以水六升煮取二升分溫三服歌曰四肢聶聶動無休皮水情形以此求己桂耆三草二兩茯苓六兩砥中流徐忠可云藥亦同防己黃耆湯但去朮加桂苓者風水之濕在經絡近內皮水之濕在皮膚近外故但以苓協桂滲周身之濕而不以術燥其中氣也不用薑棗者濕不在上焦之營衛無取乎宣之也越婢加朮湯見上里水病此湯主之甘草麻黃湯亦主之男元犀按風水皮水之外有正水而兼色黃名里水里水雖無發汗之法而邪盛正不衰者亦必藉麻黃之力深入其中透出於外以收捷效今色黃是濕熱相雜於內宜此湯如寒氣凝結於內宜甘草麻黃湯甘草麻黃湯甘草二兩麻黃四兩上二味水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒歌曰里水原來自內生一身面目腫黃呈甘須二兩麻黃四氣到二藥上宣肺氣中助土氣外行水氣因知水自行蔚按麻黃髮汗最捷徐靈胎謂其無氣無味不專一經而實無經不到蓋以出入於空虛之地凡有形之氣血不得而御之也麻黃附子湯即麻黃附子甘草湯歌見長沙方歌括麻黃附子甘草杏子湯闕徐尤云疑是麻杏甘石湯水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯客問曰金匱水氣篇杏子湯方闕諸家注說疑為麻杏甘石湯不知是否犀答曰非也麻杏甘石湯傷寒論治發汗後汗出而喘主陽盛於內也本節云水之為病發其汗即已未云熱之為病自汗出也蓋麻杏甘石湯治內蘊化熱自汗出之症此水之為病發其汗為宜則麻杏甘石湯不可用矣客又曰何以知杏子湯方用麻黃而不用石膏乎余答曰師云水病發其汗即已故知其必用麻黃而不用石膏矣夫以石膏質重寒涼之性能除裡熱清肺胃同麻黃杏仁降逆鎮喘外則旋轉於皮毛用之退熱止汗則可用之發表驅寒則不可耳然則此篇師言脈沉小屬少陰用附子溫經散寒主石水之病即可知脈浮屬太陽用杏子啟太陰之氣主正水之病為變其脈症言之也恐石膏之凝寒大有關於脾腎故不可用焉高明如徐忠可及二張二程俱疑為麻杏甘石湯甚矣讀書之難也而余以為其即麻黃杏仁甘草三味不知是否以俟後之學者客悅而去蒲灰散見消渴治厥而為皮水者此主之按皮水久而致潰為逆而不順之證以此散外敷之此厥字言證之逆非四肢厥逆之謂也諸家多誤解黃耆芍藥桂枝苦酒湯治黃汗病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉從何得之以汗出入水中浴水從汗孔入得之此湯主之黃耆五兩芍藥桂枝各三兩上三味以苦酒一升水七升相合煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒故也歌曰黃汗脈沉出汗黃水傷心火鬱成殃師云汗出入水中浴水氣從汗孔入而傷其心故水火相侵而色黃水氣摶結而脈沉也黃耆五兩推方主桂芍均三苦酒勷止汗太急故心煩也至六七日乃解者正復而邪自退也男元犀按桂枝行陽芍藥益陰黃耆氣味輕清外皮最厚故其達於皮膚最捷今煮以苦酒則直協苦酒之酸以止汗但汗出於心止之太急反見心煩至六七日正復邪退煩必自止而不止者以苦酒阻其餘邪未盡故也又按凡看書宜活看此證亦有從酒後汗出當風所致者雖無外水而所出之汗是亦水也凡脾胃受濕濕久生熱濕熱交蒸而成黃皆可以汗出入水浴之意悟之也桂枝加黃耆湯黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此榮氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上汗出下無汗腰臗弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗此湯主之桂枝芍藥生薑各三兩甘草黃耆各二兩大棗十二枚上六味以水八升煮取三升溫服一升須臾啜熱稀粥一升余以助藥力溫覆取微汗若不汗更服歌曰黃汗都由鬱熱來歷詳變態費心裁桂枝原劑耆加二啜粥重溫令郁久郁變證從汗而達開男元犀按黃本於鬱熱得汗不能透徹則鬱熱不能外達桂枝湯雖調和營衛啜粥可令作汗然恐其力量不及故又加黃耆以助之黃耆善走皮膚故前方得苦酒之酸而能收此方得薑桂之辛而能發也前方止汗是治黃汗之正病法此方令微汗是治黃汗之變證法桂甘薑棗麻辛附子湯治氣分心下堅大如盤邊如旋杯此湯主之桂枝生薑各三兩細辛甘草麻黃各二兩附子一枚炮大棗十二枚上七味以水七升先煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈歌曰心下如盤邊若杯如旋杯辛甘麻二附全枚薑桂三兩棗十二氣分須從氣轉回大氣一轉結氣乃散參此證是心腎交病上不能降下不能升日積月累如鐵石難破方中用麻黃桂枝生薑以攻其上附子細辛以攻其下甘草大棗補中焦以運其氣庶上下之氣交通而病可愈所謂大氣一轉其結乃散也枳朮湯治心下堅大如盤邊如旋杯水飲所作此湯主之枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即當散也歌曰心下如盤大又堅邪之結聚散驗其邊術宜二兩枳枚七苦泄轉療水飲愆蔚按言水飲所以別於氣分也氣無形以辛甘散之水有形以苦泄之方中取白朮之溫以健運枳實之寒以消導意深哉此方與上方互服亦是巧法附方外臺防己黃耆湯見濕病治風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和以下當腫及陰難以屈伸
