body:
  text: 後跋金匱歌括者吾師靈石先生續師祖修園老夫子大人金匱淺注之後而作所以便後學傳誦之章也會未及門時即讀傷寒論淺注並長沙歌括沉潛玩索竟莫能窺其底蘊本年春因從吾師遊聞吾師緒論深以未成父書為憾及夏間金匱淺注書成付梓復踵成歌括六卷俱告竣吾師學有淵源能繼先志雖殫精竭慮歷有年所亦可謂息重任矣會不敏忝附門牆瞻仰吾師家傳之精蘊豈遽能倣佛萬一哉是書之出有裨於世而海內之先快睹者已不啻景星慶雲之慕矣會又何庸贅焉受業門人葉享會謹跋
